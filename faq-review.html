<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VEASLY · FAQ 검토</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Noto Sans TC", "Noto Sans KR", sans-serif; margin: 0; background: #f4f4f7; color: #222; }
  header { background: #7c3aed; color: #fff; padding: 16px 20px; position: sticky; top: 0; z-index: 10; }
  header h1 { margin: 0; font-size: 18px; }
  header .sub { font-size: 13px; opacity: .9; margin-top: 4px; }
  .bar { padding: 12px 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  button { font-size: 14px; padding: 8px 14px; border: none; border-radius: 8px; cursor: pointer; }
  .btn-refresh { background: #e5e7eb; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 0 16px 60px; }
  .card { background: #fff; border-radius: 12px; padding: 16px; margin: 14px 0; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .meta { font-size: 12px; color: #888; margin-bottom: 8px; }
  .badge { display: inline-block; background: #ede9fe; color: #7c3aed; border-radius: 6px; padding: 2px 8px; margin-right: 6px; font-size: 11px; }
  label { font-size: 12px; color: #666; display: block; margin: 8px 0 2px; }
  textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 8px; font-size: 14px; font-family: inherit; resize: vertical; }
  textarea.q { min-height: 48px; } textarea.a { min-height: 96px; }
  .actions { margin-top: 12px; display: flex; gap: 10px; }
  .btn-approve { background: #16a34a; color: #fff; flex: 1; }
  .btn-reject { background: #ef4444; color: #fff; }
  .empty, .msg { text-align: center; color: #666; padding: 40px 20px; }
  .toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: #222; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity .2s; }
  .toast.show { opacity: .95; }
</style>
</head>
<body>
<header>
  <h1>🗂️ FAQ 검토 큐</h1>
  <div class="sub">AI가 만든 FAQ를 검토 → 승인하면 라이브 지식창고에 반영, 거절하면 삭제</div>
</header>
<div class="bar">
  <button class="btn-refresh" onclick="load()">↻ 새로고침</button>
  <span id="count" style="font-size:13px;color:#555;"></span>
</div>
<div class="wrap" id="list"><div class="msg">불러오는 중…</div></div>
<div class="toast" id="toast"></div>

<script>
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},1800); }

function load(){
  var list=document.getElementById('list');
  list.innerHTML='<div class="msg">불러오는 중…</div>';
  fetch('/api/faq-review/list',{credentials:'same-origin'}).then(function(r){return r.json();}).then(function(d){
    if(!d.ok){ list.innerHTML='<div class="msg">오류: '+esc(d.error)+'</div>'; return; }
    document.getElementById('count').textContent='대기 '+d.total+'건'+(d.total>=60?' (상위 60건 표시 — 처리 후 새로고침)':'');
    if(!d.items.length){ list.innerHTML='<div class="empty">🎉 검토할 FAQ가 없어요!</div>'; return; }
    list.innerHTML='';
    d.items.forEach(function(it){ list.appendChild(card(it)); });
  }).catch(function(e){ list.innerHTML='<div class="msg">네트워크 오류: '+esc(e.message)+'</div>'; });
}

function card(it){
  var div=document.createElement('div'); div.className='card';
  div.innerHTML=
    '<div class="meta"><span class="badge">'+esc(it.category||'general')+'</span>'+
    '<span class="badge">'+esc(it.source||'')+'</span>'+esc((it.createdAt||'').slice(0,10))+'</div>'+
    '<label>질문 (Q)</label><textarea class="q"></textarea>'+
    '<label>답변 (A) — 수정 후 승인 가능</label><textarea class="a"></textarea>'+
    '<div class="actions"><button class="btn-approve">✓ 승인 (라이브 반영)</button>'+
    '<button class="btn-reject">✕ 거절</button></div>';
  div.querySelector('.q').value=it.question||'';
  div.querySelector('.a').value=it.answer||'';
  div.querySelector('.btn-approve').onclick=function(){
    var q=div.querySelector('.q').value.trim(), a=div.querySelector('.a').value.trim();
    if(!q||!a){ toast('질문과 답변을 모두 입력하세요'); return; }
    act('approve',{id:it.id,question:q,answer:a,category:it.category},div,'승인됨 → 라이브 반영');
  };
  div.querySelector('.btn-reject').onclick=function(){
    if(!confirm('이 FAQ를 삭제할까요?')) return;
    act('reject',{id:it.id},div,'거절됨 (삭제)');
  };
  return div;
}

function act(kind,body,div,okMsg){
  var btns=div.querySelectorAll('button'); btns.forEach(function(b){b.disabled=true;});
  fetch('/api/faq-review/'+kind,{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){return r.json();}).then(function(d){
      if(d.ok){ toast(okMsg); div.style.transition='opacity .3s'; div.style.opacity='0'; setTimeout(function(){div.remove();},300); }
      else { toast('실패: '+(d.error||'')); btns.forEach(function(b){b.disabled=false;}); }
    }).catch(function(e){ toast('오류: '+e.message); btns.forEach(function(b){b.disabled=false;}); });
}

load();
</script>
</body>
</html>
