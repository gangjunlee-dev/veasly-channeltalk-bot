<!DOCTYPE html>

<meta charset="UTF-8">

<title>VEASLY 服務滿意度調查</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
.container { background: #fff; border-radius: 16px; padding: 32px 24px; max-width: 420px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
.logo { text-align: center; margin-bottom: 8px; }
.logo-text { font-size: 20px; font-weight: 700; color: #1a1a1a; }
.promo-banner { background: linear-gradient(135deg, #7C3AED 0%, #a78bfa 100%); color: #fff; border-radius: 10px; padding: 12px 16px; text-align: center; margin-bottom: 24px; font-size: 13px; line-height: 1.5; }
.promo-banner .promo-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.promo-banner .promo-detail { font-size: 12px; opacity: 0.9; }
.step { display: none; animation: fadeIn 0.3s ease; }
.step.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
h2 { font-size: 18px; color: #1a1a1a; margin-bottom: 8px; text-align: center; }
.subtitle { font-size: 14px; color: #888; text-align: center; margin-bottom: 24px; }
.progress { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
.progress-dot { width: 8px; height: 8px; border-radius: 50%; background: #e0e0e0; transition: background 0.3s; }
.progress-dot.active { background: #7C3AED; }
.btn-group { display: flex; gap: 12px; margin-top: 16px; }
.btn-sat { flex: 1; padding: 16px; border: 2px solid #e0e0e0; border-radius: 12px; background: #fff; font-size: 16px; cursor: pointer; transition: all 0.2s; text-align: center; }
.btn-sat:hover { border-color: #7C3AED; background: #f8f5ff; }
.btn-sat.selected { border-color: #7C3AED; background: #7C3AED; color: #fff; }
.btn-sat .emoji { font-size: 32px; display: block; margin-bottom: 8px; }
.reason-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
.reason-item { padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 10px; background: #fff; font-size: 14px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 10px; }
.reason-item:hover { border-color: #7C3AED; background: #f8f5ff; }
.reason-item.selected { border-color: #7C3AED; background: #f0ebff; }
.reason-item .check { width: 20px; height: 20px; border: 2px solid #ccc; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; color: transparent; }
.reason-item.selected .check { background: #7C3AED; border-color: #7C3AED; color: #fff; }
textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; resize: none; height: 80px; margin-top: 12px; font-family: inherit; }
textarea:focus { outline: none; border-color: #7C3AED; }
.submit-btn { width: 100%; padding: 14px; background: #7C3AED; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 16px; transition: background 0.2s; }
.submit-btn:hover { background: #6D28D9; }
.submit-btn:disabled { background: #ccc; cursor: not-allowed; }
.back-btn { background: none; border: none; color: #888; font-size: 13px; cursor: pointer; margin-top: 12px; display: block; margin-left: auto; margin-right: auto; }
.thank-you { text-align: center; padding: 40px 0; }
.thank-you .emoji { font-size: 48px; margin-bottom: 16px; }
.thank-you h2 { font-size: 20px; margin-bottom: 8px; }
.thank-you p { color: #888; font-size: 14px; line-height: 1.6; }
.email-input { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; font-family: inherit; margin-top: 16px; }
.email-input:focus { outline: none; border-color: #7C3AED; }
.email-input.valid { border-color: #10B981; }
.email-input.invalid { border-color: #EF4444; }
.expired { text-align: center; padding: 40px 0; color: #888; }
.already-done { text-align: center; padding: 40px 0; color: #888; }
.already-done .emoji { font-size: 48px; margin-bottom: 16px; }
</style>

  <!-- Step 2: Category (inquiry type) -->

    <div class="progress"><span class="progress-dot active"></span><span class="progress-dot active"></span><span class="progress-dot"></span></div>
    <h2 id="q2-title">這次諮詢的主題是？</h2>
    <p class="subtitle" id="q2-sub">請選擇一個</p>
    <div class="reason-list" id="category-list"></div>
    <button class="back-btn" onclick="goBack(1)" id="back-btn-2">← 返回</button>
  </div>

  <!-- Step 3a: Satisfied reasons -->
  <div class="step" id="step3a">
    <div class="progress"><span class="progress-dot active"></span><span class="progress-dot active"></span><span class="progress-dot active"></span></div>
    <h2 id="q3a-title">哪方面做得好呢？</h2>
    <p class="subtitle" id="q3a-sub">可複選</p>
    <div class="reason-list" id="good-reason-list"></div>
    <textarea id="comment-box-good" placeholder="" style="display:none"></textarea>
    <button class="submit-btn" id="submit-good" onclick="submitSurvey()" disabled>提交</button>
    <button class="back-btn" onclick="goBack(2)" id="back-btn-3a">← 返回</button>
  </div>

  <!-- Step 3b: Unsatisfied reasons -->
  <div class="step" id="step3b">
    <div class="progress"><span class="progress-dot active"></span><span class="progress-dot active"></span><span class="progress-dot active"></span></div>
    <h2 id="q3b-title">具體哪方面需要改善呢？</h2>
    <p class="subtitle" id="q3b-sub">可複選</p>
    <div class="reason-list" id="bad-reason-list"></div>
    <textarea id="comment-box-bad" placeholder="" style="display:none"></textarea>
    <button class="submit-btn" id="submit-bad" onclick="submitSurvey()" disabled>提交</button>
    <button class="back-btn" onclick="goBack(2)" id="back-btn-3b">← 返回</button>
  </div>

  <!-- Step 4: Thank you -->

    <div class="thank-you">
      <div class="emoji">🎉</div>
      <h2 id="ty-title">感謝您的寶貴意見！</h2>

    </div>
  </div>
</div>

function buildLists() {

    div.onclick = function() { selectCategory(this, idx); };
    catEl.appendChild(div);
  });
  // Good reasons
  var goodEl = document.getElementById('good-reason-list');
  t.goodReasons.forEach(function(r, idx) {
    var div = document.createElement('div');
    div.className = 'reason-item';
    div.innerHTML = '<span class="check">✓</span><span>' + r + '</span>';
    div.onclick = function() { toggleReason(this, goodReasonKeys[idx], 'good'); };
    goodEl.appendChild(div);
  });
  // Bad reasons
  var badEl = document.getElementById('bad-reason-list');
  t.badReasons.forEach(function(r, idx) {
    var div = document.createElement('div');
    div.className = 'reason-item';
    div.innerHTML = '<span class="check">✓</span><span>' + r + '</span>';
    div.onclick = function() { toggleReason(this, badReasonKeys[idx], 'bad'); };
    badEl.appendChild(div);
  });
}

function showStep(stepId) {
  document.querySelectorAll('.step').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(stepId).classList.add('active');
}

function selectSatisfaction(sat) {
  isSatisfied = sat;
  var btns = document.querySelectorAll('.btn-sat');
  btns[0].classList.toggle('selected', sat);
  btns[1].classList.toggle('selected', !sat);
  setTimeout(function() { showStep('step2'); }, 300);
}

function selectCategory(el, idx) {
  document.querySelectorAll('#category-list .reason-item').forEach(function(item) { item.classList.remove('selected'); });
  el.classList.add('selected');
  selectedCategory = categoryKeys[idx];
  setTimeout(function() { showStep(isSatisfied ? 'step3a' : 'step3b'); }, 300);
}

function toggleReason(el, key, type) {
  el.classList.toggle('selected');
  var i = selectedReasons.indexOf(key);
  if (i > -1) selectedReasons.splice(i, 1);
  else selectedReasons.push(key);

  var commentId = type === 'good' ? 'comment-box-good' : 'comment-box-bad';
  var submitId = type === 'good' ? 'submit-good' : 'submit-bad';
  document.getElementById(commentId).style.display = selectedReasons.indexOf('other') > -1 ? 'block' : 'none';
  document.getElementById(submitId).disabled = selectedReasons.length === 0;
}

function goBack(toStep) {
  selectedReasons = [];
  document.querySelectorAll('.reason-item.selected').forEach(function(el) {
    var parent = el.parentElement;
    if (parent.id !== 'category-list') el.classList.remove('selected');
  });
  if (toStep === 1) {
    selectedCategory = '';
    document.querySelectorAll('#category-list .reason-item').forEach(function(item) { item.classList.remove('selected'); });
    showStep('step1');
  } else if (toStep === 2) {
    showStep('step2');
  }
}

function submitEmail() {
  var input = document.getElementById('email-input');
  var email = input.value.trim();
  if (email && email.indexOf('@') > 0 && email.indexOf('.') > 0) {
    userEmail = email;
    showStep('step1');
  }
}

function skipEmail() {
  userEmail = '';
  showStep('step1');
}

// 이메일 입력 실시간 검증
document.addEventListener('DOMContentLoaded', function() {
  var emailInput = document.getElementById('email-input');
  if (emailInput) {
    emailInput.addEventListener('input', function() {
      var val = this.value.trim();
      var valid = val && val.indexOf('@') > 0 && val.indexOf('.') > 0;
      this.classList.toggle('valid', valid);
      this.classList.toggle('invalid', val.length > 0 && !valid);
      document.getElementById('email-next-btn').disabled = !valid;
    });
  }
});

function submitSurvey() {
  var commentBox = isSatisfied ? document.getElementById('comment-box-good') : document.getElementById('comment-box-bad');
  var data = {
    chatId: chatId,
    userId: userId,
    lang: lang,
    type: type,
    satisfied: isSatisfied,
    category: selectedCategory,
    reasons: selectedReasons,
    comment: (commentBox.value || '').trim(),
    submittedAt: new Date().toISOString(),
    surveyVersion: 'v3',
    email: userEmail,
    veaslyId: veaslyId,
    isMember: isMember,
    customerName: customerName
  };

  showStep('step4');
  if (isSatisfied) {
    document.getElementById('ty-title').textContent = t.tySatTitle;
    document.getElementById('ty-sub').textContent = t.tySatSub;
  } else {
    document.getElementById('ty-title').textContent = t.tyTitle;
    document.getElementById('ty-sub').textContent = t.tySub;
  }

  fetch('/api/csat/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).then(function(res) { return res.json(); })
    .then(function(result) {
      if (result.duplicate) {
        showStep('step-already');
      }
    })
    .catch(function(e) { console.error('Submit error:', e); });
}
</script>
</body>
