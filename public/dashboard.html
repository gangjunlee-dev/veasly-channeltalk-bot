<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEASLY CS Dashboard v2</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
.header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 24px 32px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 24px; color: #f8fafc; }
.header p { color: #94a3b8; margin-top: 4px; font-size: 14px; }
.header .version { color: #3b82f6; font-size: 12px; background: #1e3a5f; padding: 4px 10px; border-radius: 12px; }
.tabs { display: flex; padding: 0 32px; border-bottom: 1px solid #334155; background: #1e293b; }
.tab { padding: 12px 20px; font-size: 14px; color: #94a3b8; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab:hover { color: #e2e8f0; }
.tab.active { color: #3b82f6; border-bottom-color: #3b82f6; font-weight: 600; }
.controls { padding: 16px 32px; display: flex; gap: 12px; align-items: center; }
.controls select, .controls button { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; }
.controls button { background: #3b82f6; border: none; font-weight: 600; }
.controls button:hover { background: #2563eb; }
.controls .auto-refresh { font-size: 12px; color: #64748b; margin-left: auto; display: flex; align-items: center; gap: 6px; }
.controls .auto-refresh input { accent-color: #3b82f6; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; padding: 0 32px 16px; }
.card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; transition: transform 0.2s; }
.card:hover { transform: translateY(-2px); }
.card .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
.card .value { font-size: 28px; font-weight: 700; margin-top: 8px; }
.card .sub { font-size: 13px; color: #64748b; margin-top: 4px; }
.blue { color: #3b82f6; }
.green { color: #22c55e; }
.yellow { color: #eab308; }
.red { color: #ef4444; }
.purple { color: #a855f7; }
.cyan { color: #06b6d4; }
.charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 0 32px 16px; }
.chart-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
.chart-card h3 { font-size: 16px; margin-bottom: 16px; color: #f8fafc; }
.chart-card.full { grid-column: span 2; }
.bar-chart .bar-row { display: flex; align-items: center; margin-bottom: 8px; }
.bar-chart .bar-label { width: 120px; font-size: 13px; color: #94a3b8; flex-shrink: 0; }
.bar-chart .bar-track { flex: 1; height: 24px; background: #0f172a; border-radius: 4px; overflow: hidden; position: relative; }
.bar-chart .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.bar-chart .bar-count { font-size: 12px; color: #e2e8f0; position: absolute; right: 8px; top: 4px; }
.keyword-list { list-style: none; }
.keyword-list li { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1e293b; font-size: 14px; }
.keyword-list .kw { color: #e2e8f0; }
.keyword-list .kc { color: #3b82f6; font-weight: 600; }
.hour-chart .hour-row { display: flex; align-items: center; margin-bottom: 2px; }
.hour-chart .hour-label { width: 50px; font-size: 11px; color: #64748b; text-align: right; padding-right: 8px; }
.hour-chart .hour-bar { height: 16px; background: #3b82f6; border-radius: 2px; transition: width 0.6s ease; min-width: 2px; }
.hour-chart .hour-count { font-size: 11px; color: #94a3b8; margin-left: 6px; }
.insights { padding: 0 32px 16px; }
.insights-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
.insights-card h3 { font-size: 16px; margin-bottom: 16px; color: #f8fafc; }
.insight-item { padding: 12px 0; border-bottom: 1px solid #0f172a; font-size: 14px; line-height: 1.6; }
.insight-item:last-child { border-bottom: none; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 10px 8px; color: #94a3b8; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #334155; }
td { padding: 10px 8px; border-bottom: 1px solid #0f172a; font-size: 13px; }
.score-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
.score-high { background: rgba(34,197,94,0.15); color: #22c55e; }
.score-mid { background: rgba(234,179,8,0.15); color: #eab308; }
.score-low { background: rgba(239,68,68,0.15); color: #ef4444; }
.radar-scores { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 12px 0; }
.radar-item { text-align: center; padding: 8px 4px; background: #0f172a; border-radius: 8px; }
.radar-item .radar-val { font-size: 20px; font-weight: 700; }
.radar-item .radar-lbl { font-size: 10px; color: #94a3b8; margin-top: 2px; }
.section-title { padding: 16px 32px 8px; font-size: 18px; font-weight: 600; color: #f8fafc; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.loading { text-align: center; padding: 60px; color: #64748b; font-size: 18px; }
.pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
@media (max-width: 768px) { .charts { grid-template-columns: 1fr; } .grid { grid-template-columns: repeat(2, 1fr); } .chart-card.full { grid-column: span 1; } .radar-scores { grid-template-columns: repeat(3, 1fr); } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>VEASLY CS AI Dashboard</h1>
    <p>CS 문의 분석 & AI 성과 & 매니저 품질 평가</p>
  </div>
  <span class="version">v2.0</span>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('overview')">Overview</div>
  <div class="tab" onclick="switchTab('managers')">매니저 성과</div>
  <div class="tab" onclick="switchTab('ai')">AI 모니터링</div>
  <div class="tab" onclick="switchTab('csat')">CSAT</div>
  <div class="tab" onclick="switchTab('csscore')">CS Score</div>
</div>

<div class="controls">
  <select id="days">
    <option value="1">오늘</option>
    <option value="3">최근 3일</option>
    <option value="7" selected>최근 7일</option>
    <option value="14">최근 14일</option>
    <option value="30">최근 30일</option>
  </select>
  <button onclick="loadAllData()">조회</button>
  <div class="auto-refresh">
    <input type="checkbox" id="autoRefresh" onchange="toggleAutoRefresh()">
    <label for="autoRefresh">5분 자동 갱신</label>
    <span id="lastUpdate" style="margin-left:8px;"></span>
  </div>
</div>

<!-- TAB: Overview -->
<div id="tab-overview" class="tab-content active">
  <div id="overviewContent"><div class="loading">데이터 로딩 중...</div></div>
</div>

<!-- TAB: Managers -->
<div id="tab-managers" class="tab-content">
  <div id="managersContent"><div class="loading">매니저 데이터 로딩 중...</div></div>
</div>

<!-- TAB: AI Monitoring -->
<div id="tab-ai" class="tab-content">
  <div id="aiContent"><div class="loading">AI 데이터 로딩 중...</div></div>
</div>

<!-- TAB: CS Score -->
<div id="tab-csscore" class="tab-content">
  <div id="csscoreContent"><div class="loading">CS Score 데이터 로딩 중...</div></div>
</div>

<!-- TAB: CSAT -->
<div id="tab-csat" class="tab-content">
  <div id="csatContent"><div class="loading">CSAT 데이터 로딩 중...</div></div>
</div>

<!-- Review Modal -->
<div id="reviewModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:9999;overflow-y:auto;" onclick="if(event.target===this)closeReview()">
  <div style="max-width:700px;margin:40px auto;background:#1e293b;border-radius:16px;padding:24px;border:1px solid #334155;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 style="color:#e2e8f0;margin:0;">AI 답변 상세 / 평가</h3>
      <span style="cursor:pointer;color:#94a3b8;font-size:24px;" onclick="closeReview()">&times;</span>
    </div>
    <div id="reviewContent"></div>
  </div>
</div>

<script>
var API_BASE = window.location.origin;
var refreshTimer = null;
var cachedData = {};

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
  event.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'managers' && !cachedData.mgr) loadManagerData();
  if (name === 'ai' && !cachedData.ai) loadAIData();
  if (name === 'csat' && !cachedData.csat) loadCSATData();
  if (name === 'csscore' && !cachedData.csscore) loadCSScoreData();
}

function toggleAutoRefresh() {
  if (document.getElementById('autoRefresh').checked) {
    refreshTimer = setInterval(loadAllData, 300000);
  } else {
    clearInterval(refreshTimer);
  }
}

function loadAllData() {
  cachedData = {};
  loadOverview();
  var activeTab = document.querySelector('.tab.active');
  if (activeTab) {
    var tabName = activeTab.textContent.trim();
    if (tabName.indexOf('매니저') > -1) loadManagerData();
    if (tabName.indexOf('AI') > -1) loadAIData();
    if (tabName.indexOf('CSAT') > -1) loadCSATData();
  }
  document.getElementById('lastUpdate').textContent = new Date().toLocaleString('ko-KR');
}

// ===== OVERVIEW TAB =====
function loadOverview() {
  var days = document.getElementById('days').value;
  document.getElementById('overviewContent').innerHTML = '<div class="loading">분석 중...</div>';
  
  Promise.all([
    fetch(API_BASE + '/api/analytics/report?days=' + days).then(function(r) { return r.json(); }),
    fetch('/api/analytics/auto-close').then(function(r) { return r.json(); }).catch(function() { return null; })
  ]).then(function(results) {
    var data = results[0];
    var autoClose = results[1];
    if (!data.success) throw new Error(data.error);
    var r = data.raw;
    cachedData.overview = r;

    var botRate = r.totalMessages > 0 ? Math.round((r.botMessages / r.totalMessages) * 100) : 0;
    var aiResolveRate = (r.botMessages + r.managerMessages) > 0 ? Math.round((r.botMessages / (r.botMessages + r.managerMessages)) * 100) : 0;
    var escalationCount = r.categories.escalation ? r.categories.escalation.count : 0;
    var escalationRate = r.userMessages > 0 ? Math.round((escalationCount / r.userMessages) * 100) : 0;

    var html = '<div class="grid">';
    html += card('총 상담', r.totalChats, '건', 'blue', r.period);
    html += card('AI 봇 응답', r.botMessages, '건', 'green', '응답률 ' + botRate + '%');
    html += card('매니저 응답', r.managerMessages, '건', 'yellow', 'AI 해결률 ' + aiResolveRate + '%');
    html += card('에스컬레이션', escalationCount, '건', escalationRate > 20 ? 'red' : 'yellow', '비율 ' + escalationRate + '%');
    html += card('미해결 상담', r.unresolvedChats, '건', r.unresolvedChats > 10 ? 'red' : 'green', r.unresolvedChats > 10 ? '우선 처리 필요' : '양호');
    if (r.channelStats) {
      var cs = r.channelStats;
      var total = cs.line + cs.web + cs.other;
      html += card('LINE', cs.line, '건 (' + (total > 0 ? (cs.line/total*100).toFixed(0) : 0) + '%)', 'green', 'LINE 메신저');
      html += card('웹사이트', cs.web, '건 (' + (total > 0 ? (cs.web/total*100).toFixed(0) : 0) + '%)', 'blue', 'veasly.com');
    }
    if (autoClose && autoClose.success) {
      html += card('CSAT 대기', autoClose.csatPending, '건', autoClose.csatPending > 10 ? 'yellow' : 'green', '24h 후 자동종료');
    }
    html += '</div>';

    html += '<div class="charts">';
    html += categoryChart(r.categories);
    html += keywordChart(r.topKeywords);
    html += hourChart(r.hourlyDistribution);
    html += messageBreakdown(r);
    html += '</div>';

    html += '<div class="insights">' + insightsCard(r) + '</div>';
    document.getElementById('overviewContent').innerHTML = html;
  }).catch(function(e) {
    document.getElementById('overviewContent').innerHTML = '<div class="loading" style="color:#ef4444;">오류: ' + e.message + '</div>';
  });
}

// ===== MANAGER TAB =====
function loadManagerData() {
  var days = document.getElementById('days').value;
  document.getElementById('managersContent').innerHTML = '<div class="loading">매니저 성과 분석 중...</div>';
  
  Promise.all([
    fetch('/api/analytics/manager-performance?days=' + days).then(function(r) { return r.json(); }),
    fetch('/api/analytics/ai-reviews').then(function(r) { return r.json(); }).catch(function() { return null; })
  ]).then(function(results) {
    var mgrPerf = results[0];
    var aiReviews = results[1];
    cachedData.mgr = true;

    if (!mgrPerf || !mgrPerf.success) {
      document.getElementById('managersContent').innerHTML = '<div class="loading" style="color:#ef4444;">매니저 데이터 로드 실패</div>';
      return;
    }

    var html = '';

    // AI Quality Review Summary Cards
    var reviewData = {};
    if (aiReviews && aiReviews.recent) {
      aiReviews.recent.forEach(function(rev) {
        // Only process AI auto-scored reviews (have scores.totalScore)
        if (!rev.scores || !rev.scores.totalScore) return;
        if (!rev.managerId) return;
        if (!reviewData[rev.managerId]) reviewData[rev.managerId] = { scores: [], count: 0 };
        reviewData[rev.managerId].scores.push(rev.scores);
        reviewData[rev.managerId].count++;
      });
    }

    // Manager Cards
    html += '<div class="section-title">매니저별 성과 요약</div>';
    mgrPerf.managers.filter(function(m) { return m.status === 'active'; }).forEach(function(m) {
      var rd = reviewData[m.managerId];
      html += '<div style="padding:0 32px 16px;">';
      html += '<div class="chart-card">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;">';
      html += '<div><h3 style="margin:0;">' + m.name + '</h3><span style="color:#64748b;font-size:12px;">' + (m.email || '') + '</span></div>';
      
      // Overall score badge
      var totalScore = m.qualityScore ? m.qualityScore.total : 0;
      var scoreClass = totalScore >= 65 ? 'score-high' : totalScore >= 50 ? 'score-mid' : 'score-low';
      html += '<div style="text-align:right;"><span class="score-badge ' + scoreClass + '" style="font-size:18px;padding:4px 12px;">' + totalScore + '/100 (' + (m.qualityScore ? m.qualityScore.grade : '-') + ')</span></div>';
      html += '</div>';

      // Stats row
      html += '<div class="grid" style="padding:16px 0 0;margin:0;">';
      html += miniCard('답변 수', m.totalReplies, 'blue');
      html += miniCard('담당 채팅', m.uniqueChats, 'purple');
      html += miniCard('평균 답변길이', m.avgReplyLength + '자', 'cyan');
      var rtColor = m.avgResponseTimeMin > 60 ? 'red' : m.avgResponseTimeMin > 30 ? 'yellow' : 'green';
      html += miniCard('평균 응답시간', m.avgResponseTimeMin > 0 ? m.avgResponseTimeMin + '분' : '-', rtColor);
      html += '</div>';

      // AI Quality Scores (if available)
      if (rd && rd.count > 0) {
        var avg = { resolution: 0, attitude: 0, accuracy: 0, responsiveness: 0, professionalism: 0, total: 0 };
        rd.scores.forEach(function(s) {
          avg.resolution += (s.resolution || 0);
          avg.attitude += (s.attitude || 0);
          avg.accuracy += (s.accuracy || 0);
          avg.responsiveness += (s.responsiveness || 0);
          avg.professionalism += (s.professionalism || 0);
          avg.total += (s.totalScore || 0);
        });
        var n = rd.count;
        html += '<div style="margin-top:16px;padding-top:16px;border-top:1px solid #334155;">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><span style="color:#94a3b8;font-size:13px;">AI 품질 채점 (' + n + '건 분석)</span>';
        var aiTotal = (avg.total / n);
        var aiClass = aiTotal >= 20 ? 'score-high' : aiTotal >= 15 ? 'score-mid' : 'score-low';
        html += '<span class="score-badge ' + aiClass + '">' + aiTotal.toFixed(1) + '/25</span></div>';
        html += '<div class="radar-scores">';
        html += radarItem('문제해결', (avg.resolution/n).toFixed(1));
        html += radarItem('응대태도', (avg.attitude/n).toFixed(1));
        html += radarItem('정보정확', (avg.accuracy/n).toFixed(1));
        html += radarItem('응답속도', (avg.responsiveness/n).toFixed(1));
        html += radarItem('전문성', (avg.professionalism/n).toFixed(1));
        html += '</div></div>';
      } else {
        html += '<div style="margin-top:12px;padding:12px;background:#0f172a;border-radius:8px;color:#64748b;font-size:13px;text-align:center;">AI 품질 채점 데이터 수집 중...</div>';
      }

      html += '</div></div>';
    });

    // Inactive managers
    var inactive = mgrPerf.managers.filter(function(m) { return m.status === 'inactive'; });
    if (inactive.length > 0) {
      html += '<div class="section-title" style="color:#64748b;">비활성 매니저</div>';
      html += '<div style="padding:0 32px 16px;"><div class="chart-card">';
      html += '<table><tr><th>매니저</th><th>이메일</th><th>상태</th></tr>';
      inactive.forEach(function(m) {
        html += '<tr><td style="color:#64748b;">' + m.name + '</td><td style="color:#475569;">' + (m.email || '') + '</td><td><span class="pill" style="background:rgba(239,68,68,0.15);color:#ef4444;">비활성</span></td></tr>';
      });
      html += '</table></div></div>';
    }

    // Recent AI Reviews
    if (aiReviews && aiReviews.recent && aiReviews.recent.length > 0) {
      html += '<div class="section-title">최근 AI 품질 리뷰</div>';
      html += '<div style="padding:0 32px 16px;"><div class="chart-card">';
      html += '<div style="max-height:400px;overflow-y:auto;">';
      html += '<table><tr><th>시간</th><th>매니저</th><th>점수</th><th>평가 요약</th></tr>';
      aiReviews.recent.slice(0, 20).forEach(function(rev) {
        var time = rev.timestamp ? rev.timestamp.substring(5, 16).replace('T', ' ') : '-';
        var sc = rev.scores ? rev.scores.totalScore : 0;
        var scClass = sc >= 20 ? 'score-high' : sc >= 15 ? 'score-mid' : 'score-low';
        var mgr = mgrPerf.managers.find(function(m) { return m.managerId === rev.managerId; });
        var mgrName = mgr ? mgr.name : (rev.managerId || '').substring(0, 8);
        html += '<tr><td style="color:#64748b;white-space:nowrap;">' + time + '</td><td style="color:#e2e8f0;">' + mgrName + '</td><td><span class="score-badge ' + scClass + '">' + sc + '/25</span></td><td style="color:#94a3b8;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + (rev.scores ? rev.scores.summary || '' : '') + '</td></tr>';
      });
      html += '</table></div></div></div>';
    }

    document.getElementById('managersContent').innerHTML = html;
  });
}

// ===== AI MONITORING TAB =====
function loadAIData() {
  var days = document.getElementById('days').value;
  document.getElementById('aiContent').innerHTML = '<div class="loading">AI 대화 데이터 로딩 중...</div>';
  
  Promise.all([
    fetch('/api/analytics/ai-conversations?limit=50').then(function(r) { return r.json(); }),
    fetch('/api/analytics/ai-reviews').then(function(r) { return r.json(); }).catch(function() { return null; })
  ]).then(function(results) {
    var aiConv = results[0];
    var aiReviews = results[1];
    cachedData.ai = true;

    var html = '';

    // AI accuracy stats
    if (aiReviews && aiReviews.total > 0) {
      var goodPct = Math.round((aiReviews.good / aiReviews.total) * 100);
      var badPct = Math.round((aiReviews.bad / aiReviews.total) * 100);
      var fixPct = Math.round((aiReviews.fix / aiReviews.total) * 100);
      html += '<div class="grid">';
      html += card('수동 평가 합계', aiReviews.total, '건', 'blue', '대시보드 수동평가');
      html += card('정확', aiReviews.good, '건 (' + goodPct + '%)', 'green', '올바른 답변');
      html += card('부정확', aiReviews.bad, '건 (' + badPct + '%)', 'red', '잘못된 답변');
      html += card('수정필요', aiReviews.fix, '건 (' + fixPct + '%)', 'yellow', '개선 가능');
      html += '</div>';
    }

    // AI Conversation stats
    if (aiConv && aiConv.success) {
      var st = aiConv.stats || {};
      html += '<div class="grid">';
      html += card('오늘 AI 대화', st.today || 0, '건', 'blue', '금일 처리량');
      html += card('전체 AI 대화', st.total || 0, '건', 'cyan', '누적');
      html += card('에스컬레이션률', (st.escalatedRate || 0) + '%', '', st.escalatedRate > 20 ? 'red' : 'green', '목표: 20% 이하');

      // Type distribution
      var types = {};
      (aiConv.conversations || []).forEach(function(c) { types[c.type] = (types[c.type] || 0) + 1; });
      var typeStr = Object.keys(types).map(function(t) { return t + ':' + types[t]; }).join(', ');

      // Escalation reason analysis

        var msg = (c.userMessage || '').toLowerCase();
        if (msg.indexOf('合併') > -1 || msg.indexOf('一起寄') > -1) escReasons['합배송'] = (escReasons['합배송'] || 0) + 1;
        else if (msg.indexOf('取消') > -1) escReasons['취소관련'] = (escReasons['취소관련'] || 0) + 1;
        else if (msg.indexOf('客服') > -1 || msg.indexOf('人工') > -1 || msg.indexOf('轉') > -1) escReasons['직접요청'] = (escReasons['직접요청'] || 0) + 1;
        else if (msg.indexOf('沒收到') > -1 || msg.indexOf('還沒到') > -1 || msg.indexOf('出貨') > -1) escReasons['배송지연'] = (escReasons['배송지연'] || 0) + 1;
        else if (msg.indexOf('不滿') > -1 || msg.indexOf('太差') > -1 || msg.indexOf('投訴') > -1) escReasons['불만'] = (escReasons['불만'] || 0) + 1;
        else escReasons['기타'] = (escReasons['기타'] || 0) + 1;
      });

      if (Object.keys(escReasons).length > 0) {
        html += '<div class="charts">';
        html += '<div class="chart-card"><h3>에스컬레이션 사유 분석</h3><div class="bar-chart">';
        var escMax = 1;
        Object.values(escReasons).forEach(function(v) { if (v > escMax) escMax = v; });
        var escColors = { '합배송': '#3b82f6', '취소관련': '#ef4444', '직접요청': '#eab308', '배송지연': '#f97316', '불만': '#ef4444', '기타': '#64748b' };
        Object.keys(escReasons).sort(function(a, b) { return escReasons[b] - escReasons[a]; }).forEach(function(k) {
          var pct = Math.round((escReasons[k] / escMax) * 100);
          html += '<div class="bar-row"><div class="bar-label">' + k + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + (escColors[k] || '#64748b') + ';"></div><span class="bar-count">' + escReasons[k] + '</span></div></div>';
        });
        html += '</div></div>';

        // Language distribution from conversations
        var langs = {};
        (aiConv.conversations || []).forEach(function(c) { var l = c.lang || 'unknown'; langs[l] = (langs[l] || 0) + 1; });
        html += '<div class="chart-card"><h3>언어별 분포</h3><div class="bar-chart">';
        var langNames = { 'zh-TW': '繁體中文', 'ko': '한국어', 'en': 'English', 'ja': '日本語', 'unknown': '미감지' };
        var langMax = 1;
        Object.values(langs).forEach(function(v) { if (v > langMax) langMax = v; });
        Object.keys(langs).sort(function(a, b) { return langs[b] - langs[a]; }).forEach(function(k) {
          var pct = Math.round((langs[k] / langMax) * 100);
          html += '<div class="bar-row"><div class="bar-label">' + (langNames[k] || k) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:#3b82f6;"></div><span class="bar-count">' + langs[k] + '</span></div></div>';
        });
        html += '</div></div></div>';
      }

      // AI Conversation table
      html += '<div class="section-title">AI 대화 로그</div>';
      html += '<div style="padding:0 32px 16px;"><div class="chart-card">';
      html += '<div style="max-height:600px;overflow-y:auto;">';
      html += '<table><tr><th>시간</th><th>유형</th><th>고객 질문</th><th>AI 답변</th><th>상태</th></tr>';

      var typeColors = { ai_answer: '#22c55e', order_lookup: '#3b82f6', greeting: '#94a3b8', escalation: '#eab308', thank_you: '#a855f7', order_list: '#06b6d4', file_message: '#64748b' };
      var typeNames = { ai_answer: 'AI답변', order_lookup: '주문조회', greeting: '인사', escalation: '에스컬레이션', thank_you: '감사', order_list: '주문목록', file_message: '파일' };

      (aiConv.conversations || []).forEach(function(c) {
        var time = c.timestamp ? c.timestamp.substring(5, 16).replace('T', ' ') : '-';
        var tc = typeColors[c.type] || '#94a3b8';
        var tn = typeNames[c.type] || c.type;
        var userMsg = (c.userMessage || '').substring(0, 60) + ((c.userMessage || '').length > 60 ? '...' : '');
        var aiResp = (c.aiResponse || '').substring(0, 80) + ((c.aiResponse || '').length > 80 ? '...' : '');
        var statusIcon = c.escalated ? '<span class="pill" style="background:rgba(239,68,68,0.15);color:#ef4444;">에스컬</span>' : '<span class="pill" style="background:rgba(34,197,94,0.15);color:#22c55e;">완료</span>';

        html += '<tr style="cursor:pointer;" onclick="showReview(\'' + encodeURIComponent(JSON.stringify(c)) + '\')">';

      });

    }

    document.getElementById('aiContent').innerHTML = html;
  });
}

  ]).then(function(results) {

        }
        html += '</div></div>';

        html += '<div style="color:#64748b;font-size:13px;padding:20px;text-align:center;">CSAT 수집 시작 후 매니저별 만족도 데이터가 표시됩니다.</div>';

    } else {
      html += '<div style="padding:32px;text-align:center;">';

// ===== HELPERS =====
function card(label, value, unit, color, sub) {
  return '<div class="card"><div class="label">' + label + '</div><div class="value ' + color + '">' + value + '<span style="font-size:14px;color:#64748b;"> ' + unit + '</span></div><div class="sub">' + sub + '</div></div>';
}
function miniCard(label, value, color) {
  return '<div style="background:#0f172a;padding:10px 14px;border-radius:8px;text-align:center;"><div style="font-size:11px;color:#64748b;">' + label + '</div><div style="font-size:18px;font-weight:700;margin-top:4px;" class="' + color + '">' + value + '</div></div>';
}
function radarItem(label, value) {
  var v = parseFloat(value);
  var color = v >= 4 ? '#22c55e' : v >= 3 ? '#eab308' : '#ef4444';
  return '<div class="radar-item"><div class="radar-val" style="color:' + color + ';">' + value + '</div><div class="radar-lbl">' + label + '</div></div>';
}
function categoryChart(cats) {
  var items = [];
  var catKeys = Object.keys(cats);
  for (var i = 0; i < catKeys.length; i++) {
    if (cats[catKeys[i]].count > 0) items.push({ key: catKeys[i], name: cats[catKeys[i]].nameKo || cats[catKeys[i]].name, count: cats[catKeys[i]].count });
  }
  items.sort(function(a, b) { return b.count - a.count; });
  var max = items.length > 0 ? items[0].count : 1;
  var colors = ['#3b82f6','#22c55e','#eab308','#ef4444','#a855f7','#06b6d4','#f97316','#ec4899','#84cc16','#6366f1'];
  var h = '<div class="chart-card"><h3>문의 카테고리 분포</h3><div class="bar-chart">';
  for (var j = 0; j < items.length; j++) {
    var pct = Math.round((items[j].count / max) * 100);
    h += '<div class="bar-row"><div class="bar-label">' + items[j].name + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + colors[j % colors.length] + ';"></div><span class="bar-count">' + items[j].count + '</span></div></div>';
  }
  h += '</div></div>';
  return h;
}
function keywordChart(keywords) {
  var h = '<div class="chart-card"><h3>자주 언급된 키워드 TOP 10</h3><ul class="keyword-list">';
  var kws = (keywords || []).slice(0, 10);
  for (var i = 0; i < kws.length; i++) {
    var word = kws[i].word.length > 20 ? kws[i].word.substring(0, 20) + '...' : kws[i].word;
    h += '<li><span class="kw">' + (i + 1) + '. ' + word + '</span><span class="kc">' + kws[i].count + '</span></li>';
  }
  h += '</ul></div>';
  return h;
}
function hourChart(dist) {
  var max = 1;
  for (var hh = 0; hh < 24; hh++) { if ((dist[hh] || 0) > max) max = dist[hh]; }
  var h = '<div class="chart-card"><h3>시간대별 문의 (대만 시간)</h3><div class="hour-chart">';
  for (var hh = 0; hh < 24; hh++) {
    var c = dist[hh] || 0;
    var w = Math.round((c / max) * 100);
    h += '<div class="hour-row"><div class="hour-label">' + (hh < 10 ? '0' : '') + hh + ':00</div><div class="hour-bar" style="width:' + w + '%;' + (c === max ? 'background:#ef4444;' : '') + '"></div><div class="hour-count">' + (c > 0 ? c : '') + '</div></div>';
  }
  h += '</div></div>';
  return h;
}
function messageBreakdown(r) {
  var total = r.botMessages + r.managerMessages;
  var botPct = total > 0 ? Math.round((r.botMessages / total) * 100) : 0;
  var mgrPct = 100 - botPct;
  var h = '<div class="chart-card"><h3>AI vs 매니저 응답 비율</h3>';
  h += '<div style="display:flex;height:24px;border-radius:12px;overflow:hidden;margin:20px 0;">';
  h += '<div style="width:' + botPct + '%;background:#22c55e;"></div>';
  h += '<div style="width:' + mgrPct + '%;background:#eab308;"></div>';
  h += '</div>';
  h += '<div style="display:flex;justify-content:space-between;font-size:14px;">';
  h += '<span style="color:#22c55e;">AI 봇 ' + botPct + '% (' + r.botMessages + '건)</span>';
  h += '<span style="color:#eab308;">매니저 ' + mgrPct + '% (' + r.managerMessages + '건)</span>';
  h += '</div>';
  h += '<div style="margin-top:16px;padding-top:12px;border-top:1px solid #334155;font-size:13px;color:#94a3b8;">목표: AI 응답률 70% 이상</div></div>';
  return h;
}
function insightsCard(r) {
  var insights = [];
  var catKeys = Object.keys(r.categories);
  var topCat = { key: '', count: 0 };
  for (var i = 0; i < catKeys.length; i++) {
    if (catKeys[i] !== 'other' && catKeys[i] !== 'escalation' && r.categories[catKeys[i]].count > topCat.count) {
      topCat = { key: catKeys[i], count: r.categories[catKeys[i]].count, name: r.categories[catKeys[i]].nameKo };
    }
  }
  if (topCat.count > 0) insights.push('<span style="color:#3b82f6;">📊</span> 가장 많은 문의: <strong>' + topCat.name + '</strong> (' + topCat.count + '건) — FAQ 강화로 AI 해결률 향상 가능');
  if (r.unresolvedChats > 10) insights.push('<span style="color:#ef4444;">⚠️</span> 미해결 <strong>' + r.unresolvedChats + '건</strong> — 우선 처리 필요');
  var escCount = r.categories.escalation ? r.categories.escalation.count : 0;
  var aiRate = Math.round((r.botMessages / (r.botMessages + r.managerMessages)) * 100);
  if (aiRate >= 70) insights.push('<span style="color:#22c55e;">✅</span> AI 응답률 <strong>' + aiRate + '%</strong> — 목표(70%) 달성');
  else insights.push('<span style="color:#eab308;">📈</span> AI 응답률 <strong>' + aiRate + '%</strong> — 목표 70%까지 ' + (70 - aiRate) + '%p 필요');

  var h = '<div class="insights-card"><h3>AI 인사이트</h3>';
  for (var j = 0; j < insights.length; j++) {
    h += '<div class="insight-item">' + insights[j] + '</div>';
  }
  h += '</div>';
  return h;
}

function showReview(encoded) {

  html += '</div>';
  html += '<div style="margin-bottom:16px;padding:12px;background:#0f172a;border-radius:8px;border-left:3px solid ' + (c.escalated ? '#ef4444' : '#22c55e') + ';">';
  html += '<div style="color:#64748b;font-size:12px;margin-bottom:4px;">AI 답변 (' + (c.type || '-') + ')' + (c.escalated ? ' <span style="color:#ef4444">에스컬레이션</span>' : '') + '</div>';

  html += '</div>';
  html += '<div style="margin-bottom:12px;color:#94a3b8;font-size:13px;">이 AI 답변의 품질을 평가해주세요:</div>';

  html += '<button onclick="submitReview(\'' + encodeURIComponent(JSON.stringify(c)) + '\', \'good\')" style="flex:1;padding:12px;background:#166534;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;">✅ 정확함</button>';
  html += '<button onclick="submitReview(\'' + encodeURIComponent(JSON.stringify(c)) + '\', \'bad\')" style="flex:1;padding:12px;background:#991b1b;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;">❌ 부정확</button>';
  html += '<button onclick="submitReview(\'' + encodeURIComponent(JSON.stringify(c)) + '\', \'fix\')" style="flex:1;padding:12px;background:#92400e;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;">🔧 수정필요</button>';
  html += '</div>';

  document.getElementById('reviewContent').innerHTML = html;
  document.getElementById('reviewModal').style.display = 'block';
}
function closeReview() { document.getElementById('reviewModal').style.display = 'none'; }
function submitReview(encoded, rating) {
  var c = JSON.parse(decodeURIComponent(encoded));
  var comment = document.getElementById('reviewComment').value;
  fetch('/api/analytics/ai-review', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chatId: c.chatId, timestamp: c.timestamp, rating: rating, comment: comment, userMessage: c.userMessage, aiResponse: c.aiResponse })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.success) {
      var msgs = { good: '✅ 정확함으로 평가됨', bad: '❌ 부정확으로 평가됨', fix: '🔧 수정필요로 평가됨' };
      document.getElementById('reviewContent').innerHTML = '<div style="text-align:center;padding:40px;"><div style="font-size:48px;margin-bottom:16px;">' + (rating === 'good' ? '✅' : rating === 'bad' ? '❌' : '🔧') + '</div><div style="color:#e2e8f0;font-size:18px;">' + msgs[rating] + '</div></div>';
      setTimeout(closeReview, 1500);
    }
  }).catch(function(e) { alert('Error: ' + e.message); });
}

      var metrics = [
        { label: '첫 응답 속도', icon: '&#9889;', value: (d.responseTime ? d.responseTime.within30MinRate + '%' : 'N/A'), detail: '30분 내 응답 비율 (평균 ' + (d.responseTime ? d.responseTime.avgMinutes + '분' : '?') + ')', target: '>=80%', score: bd.frt ? bd.frt.score : 0 },
        { label: '첫 접촉 해결률', icon: '&#127919;', value: (d.fcr ? d.fcr.rate + '%' : 'N/A'), detail: d.fcr ? d.fcr.resolved + '건 해결 / ' + d.fcr.reopened + '건 재문의' : '', target: '>=70%', score: bd.fcr ? bd.fcr.score : 0 },
        { label: '고객 만족도', icon: '&#11088;', value: (bd.csat ? bd.csat.score.toFixed(1) : 'N/A'), detail: '/5.0', target: '>=3.5', score: bd.csat ? bd.csat.score : 0 },
        { label: '고객 노력 점수', icon: '&#128170;', value: (d.ces && d.ces.totalResponses > 0 ? d.ces.avgScore.toFixed(1) : '수집 중...'), detail: d.ces ? d.ces.totalResponses + '건 응답' : '데이터 수집 중', target: '>=3.5', score: bd.ces ? bd.ces.score : 0 },
        { label: '미응답 종료율', icon: '&#128277;', value: (d.noReplyClose ? d.noReplyClose.rate + '%' : 'N/A'), detail: d.noReplyClose ? d.noReplyClose.count + '/' + d.noReplyClose.total + '건' : '', target: '<=10%', score: bd.noReply ? bd.noReply.score : 0 }
      ];
      metrics.forEach(function(m) {
        var mColor = m.score >= 4 ? '#10b981' : m.score >= 3 ? '#f59e0b' : '#ef4444';
        html += '<div style="background:#1e293b;border-radius:12px;padding:16px;text-align:center;border-left:4px solid ' + mColor + '">';
        html += '<div style="font-size:24px;margin-bottom:4px">' + m.icon + '</div>';
        html += '<div style="font-size:11px;color:#94a3b8;margin-bottom:8px">' + m.label + '</div>';
        html += '<div style="font-size:28px;font-weight:700;color:white">' + m.value + '</div>';
        html += '<div style="font-size:10px;color:#64748b">' + m.detail + '</div>';
        html += '<div style="margin-top:8px;font-size:11px;color:' + mColor + ';font-weight:600">점수: ' + m.score.toFixed(1) + '/5 (목표 ' + m.target + ')</div>';
        html += '</div>';
      });
      html += '</div>';

      // Response Time Distribution
      if (d.responseTime && d.responseTime.distribution) {
        var dist = d.responseTime.distribution;
        var total = d.responseTime.totalSamples || 1;
        html += '<div style="background:#1e293b;border-radius:12px;padding:20px;margin-bottom:16px">';
        html += '<div style="font-size:14px;font-weight:600;color:white;margin-bottom:16px">Response Time Distribution</div>';
        var bars = [
          { label: '5분 미만', count: dist.under5 || 0, color: '#10b981' },
          { label: '5~15분', count: dist.under15 || 0, color: '#22d3ee' },
          { label: '15~30분', count: dist.under30 || 0, color: '#f59e0b' },
          { label: '30~60분', count: dist.under60 || 0, color: '#f97316' },
          { label: '60분 초과', count: dist.over60 || 0, color: '#ef4444' }
        ];
        bars.forEach(function(b) {
          var pct = Math.round(b.count / total * 100);
          html += '<div style="display:flex;align-items:center;margin-bottom:8px">';
          html += '<span style="width:70px;font-size:11px;color:#94a3b8">' + b.label + '</span>';
          html += '<div style="flex:1;background:#0f172a;border-radius:4px;height:24px;margin:0 8px;overflow:hidden">';
          html += '<div style="width:' + pct + '%;height:100%;background:' + b.color + ';border-radius:4px"></div>';
          html += '</div>';
          html += '<span style="width:60px;font-size:12px;color:white;text-align:right">' + b.count + ' (' + pct + '%)</span>';
          html += '</div>';
        });
        html += '</div>';
      }

      // Manager Performance Table
      if (d.managerResponseTime && d.managerResponseTime.length > 0) {
        html += '<div style="background:#1e293b;border-radius:12px;padding:20px;margin-bottom:16px">';
        html += '<div style="font-size:14px;font-weight:600;color:white;margin-bottom:12px">Manager Response Performance</div>';
        html += '<table style="width:100%;border-collapse:collapse;font-size:12px">';
        html += '<tr style="color:#64748b;border-bottom:1px solid #334155"><th style="padding:8px;text-align:left">Manager</th><th>Avg FRT</th><th>Within 30min</th><th>Samples</th><th>Status</th></tr>';
        d.managerResponseTime.forEach(function(m) {
          var si = m.within30Rate >= 80 ? '&#128994;' : m.within30Rate >= 50 ? '&#128993;' : '&#128308;';
          html += '<tr style="color:white;border-bottom:1px solid #1e293b"><td style="padding:8px">' + (mgrNameMap[m.managerId] || m.managerId) + '</td>';
          html += '<td style="text-align:center">' + m.avgMin + 'min</td>';
          html += '<td style="text-align:center">' + m.within30Rate + '%</td>';
          html += '<td style="text-align:center">' + m.samples + '</td>';
          html += '<td style="text-align:center">' + si + '</td></tr>';
        });
        html += '</table></div>';
      }

      // FCR Detail
      if (d.fcr) {
        html += '<div style="background:#1e293b;border-radius:12px;padding:20px;margin-bottom:16px">';
        html += '<div style="font-size:14px;font-weight:600;color:white;margin-bottom:12px">First Contact Resolution (FCR)</div>';
        html += '<div style="display:flex;gap:20px">';
        html += '<div style="flex:1;text-align:center"><div style="font-size:36px;font-weight:700;color:' + (d.fcr.rate >= 70 ? '#10b981' : '#ef4444') + '">' + d.fcr.rate + '%</div><div style="font-size:11px;color:#94a3b8">FCR Rate</div></div>';
        html += '<div style="flex:1;text-align:center"><div style="font-size:36px;font-weight:700;color:#22d3ee">' + d.fcr.resolved + '</div><div style="font-size:11px;color:#94a3b8">Resolved</div></div>';
        html += '<div style="flex:1;text-align:center"><div style="font-size:36px;font-weight:700;color:#f59e0b">' + d.fcr.reopened + '</div><div style="font-size:11px;color:#94a3b8">Reopened (72h)</div></div>';
        html += '</div></div>';
      }

      // CES Detail
      html += '<div style="background:#1e293b;border-radius:12px;padding:20px;margin-bottom:16px">';
      html += '<div style="font-size:14px;font-weight:600;color:white;margin-bottom:12px">Customer Effort Score (CES)</div>';
      if (d.ces && d.ces.totalResponses > 0) {
        var cesColor = d.ces.avgScore >= 3.5 ? '#10b981' : d.ces.avgScore >= 2.5 ? '#f59e0b' : '#ef4444';
        html += '<div style="display:flex;gap:20px">';
        html += '<div style="flex:1;text-align:center"><div style="font-size:36px;font-weight:700;color:' + cesColor + '">' + d.ces.avgScore.toFixed(1) + '</div><div style="font-size:11px;color:#94a3b8">Average Score (1-5)</div></div>';
        html += '<div style="flex:1;text-align:center"><div style="font-size:36px;font-weight:700;color:#22d3ee">' + d.ces.totalResponses + '</div><div style="font-size:11px;color:#94a3b8">Total Responses</div></div>';
        html += '</div>';
        html += '<div style="margin-top:12px;font-size:12px;color:#94a3b8">1=매우 어려움 ~ 5=매우 쉬움 | 목표: 3.5 이상</div>';
      } else {
        html += '<div style="text-align:center;padding:20px;color:#64748b">';
        html += '<div style="font-size:36px;margin-bottom:8px">&#128202;</div>';
        html += '<div style="font-size:14px">CES data collection started</div>';
        html += '<div style="font-size:12px;margin-top:4px">After CSAT survey, customers will be asked: "How easy was it to resolve your issue?"</div>';
        html += '<div style="font-size:11px;margin-top:8px;color:#f59e0b">Data will appear here as responses come in</div>';
        html += '</div>';
      }
      html += '</div>';

      // Improvement Suggestions
      html += '<div style="background:#1e293b;border-radius:12px;padding:20px">';
      html += '<div style="font-size:14px;font-weight:600;color:white;margin-bottom:12px">Priority Improvements</div>';
      var suggestions = [];
      if (bd.noReply && bd.noReply.score < 3) suggestions.push({ p: 'HIGH', t: '미응답 종료율 ' + (d.noReplyClose ? d.noReplyClose.rate : '?') + '% (목표 10% 이하). 15분 자동 재배정 + 30분 대기 메시지 가동 중.' });
      if (bd.frt && bd.frt.score < 3) suggestions.push({ p: 'HIGH', t: '첫 응답 속도: ' + (d.responseTime ? d.responseTime.within30MinRate : '?') + '% 30분 내 응답 (목표 80% 이상). 매니저 근무시간 조정 필요.' });
      if (bd.fcr && bd.fcr.score < 3) suggestions.push({ p: 'MED', t: '첫 접촉 해결률: ' + (d.fcr ? d.fcr.rate : '?') + '% (목표 70% 이상). AI 직접 답변 범위 확대 필요.' });
      if (bd.csat && bd.csat.score < 3) suggestions.push({ p: 'MED', t: '고객 만족도 데이터 부족. 설문 수집 중, 응답 대기.' });
      if (bd.ces && bd.ces.score < 3) suggestions.push({ p: 'LOW', t: '고객 노력 점수 수집 시작됨. 약 2주 후 유의미한 데이터 확보 예상.' });
      if (suggestions.length === 0) suggestions.push({ p: 'OK', t: '모든 지표가 목표를 달성하고 있습니다!' });
      suggestions.forEach(function(s) {
        var pc = s.p === 'HIGH' ? '#ef4444' : s.p === 'MED' ? '#f59e0b' : '#10b981';
        html += '<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;padding:10px;background:#0f172a;border-radius:8px;border-left:3px solid ' + pc + '">';
        html += '<span style="font-size:10px;font-weight:700;color:' + pc + ';white-space:nowrap">[' + s.p + ']</span>';
        html += '<span style="font-size:12px;color:#e2e8f0">' + s.t + '</span>';
        html += '</div>';
      });
      html += '</div>';

      container.innerHTML = html;
    })
    .catch(function(e) { console.log('CS Score load error:', e); });
}

</script>
</body>
</html>
