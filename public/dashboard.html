<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEASLY CS Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
.header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 24px 32px; border-bottom: 1px solid #334155; }
.header h1 { font-size: 24px; color: #f8fafc; }
.header p { color: #94a3b8; margin-top: 4px; font-size: 14px; }
.controls { padding: 16px 32px; display: flex; gap: 12px; align-items: center; }
.controls select, .controls button { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; }
.controls button { background: #3b82f6; border: none; font-weight: 600; }
.controls button:hover { background: #2563eb; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; padding: 0 32px 16px; }
.card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
.card .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
.card .value { font-size: 32px; font-weight: 700; margin-top: 8px; }
.card .sub { font-size: 13px; color: #64748b; margin-top: 4px; }
.blue { color: #3b82f6; }
.green { color: #22c55e; }
.yellow { color: #eab308; }
.red { color: #ef4444; }
.purple { color: #a855f7; }
.charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 0 32px 16px; }
.chart-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
.chart-card h3 { font-size: 16px; margin-bottom: 16px; color: #f8fafc; }
.bar-chart .bar-row { display: flex; align-items: center; margin-bottom: 8px; }
.bar-chart .bar-label { width: 120px; font-size: 13px; color: #94a3b8; flex-shrink: 0; }
.bar-chart .bar-track { flex: 1; height: 24px; background: #0f172a; border-radius: 4px; overflow: hidden; position: relative; }
.bar-chart .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.bar-chart .bar-count { font-size: 12px; color: #e2e8f0; position: absolute; right: 8px; top: 4px; }
.keyword-list { list-style: none; }
.keyword-list li { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1e293b; font-size: 14px; }
.keyword-list .kw { color: #e2e8f0; }
.keyword-list .kc { color: #3b82f6; font-weight: 600; }
.hour-chart .hour-row { display: flex; align-items: center; margin-bottom: 2px; }
.hour-chart .hour-label { width: 50px; font-size: 11px; color: #64748b; text-align: right; padding-right: 8px; }
.hour-chart .hour-bar { height: 16px; background: #3b82f6; border-radius: 2px; transition: width 0.6s ease; min-width: 2px; }
.hour-chart .hour-count { font-size: 11px; color: #94a3b8; margin-left: 6px; }
.insights { padding: 0 32px 32px; }
.insights-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
.insights-card h3 { font-size: 16px; margin-bottom: 16px; color: #f8fafc; }
.insight-item { padding: 12px 0; border-bottom: 1px solid #0f172a; font-size: 14px; line-height: 1.6; }
.insight-item:last-child { border-bottom: none; }
.insight-icon { margin-right: 8px; }
.loading { text-align: center; padding: 60px; color: #64748b; font-size: 18px; }
@media (max-width: 768px) { .charts { grid-template-columns: 1fr; } .grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<div class="header">
  <h1>VEASLY CS AI Dashboard</h1>
  <p>CS 문의 분석 & AI 성과 대시보드</p>
</div>
<div class="controls">
  <select id="days">
    <option value="3">최근 3일</option>
    <option value="7" selected>최근 7일</option>
    <option value="14">최근 14일</option>
    <option value="30">최근 30일</option>
  </select>
  <button onclick="loadData()">조회</button>
  <span id="lastUpdate" style="font-size:12px;color:#64748b;margin-left:auto;"></span>
</div>
<div id="content"><div class="loading">데이터 로딩 중...</div></div>
<script>
var API_BASE = window.location.origin;
function loadData() {
  var days = document.getElementById('days').value;
  document.getElementById('content').innerHTML = '<div class="loading">분석 중... (약 10-30초 소요)</div>';
  fetch(API_BASE + '/api/analytics/report?days=' + days)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.success) throw new Error(data.error);
      render(data.raw);
      document.getElementById('lastUpdate').textContent = '업데이트: ' + new Date().toLocaleString('ko-KR');
    })
    .catch(function(e) {
      document.getElementById('content').innerHTML = '<div class="loading" style="color:#ef4444;">오류: ' + e.message + '</div>';
    });
}
function render(r) {
  var totalCategorized = 0;
  var catKeys = Object.keys(r.categories);
  for (var i = 0; i < catKeys.length; i++) {
    if (catKeys[i] !== 'other' && catKeys[i] !== 'escalation') totalCategorized += r.categories[catKeys[i]].count;
  }
  var botRate = r.totalMessages > 0 ? Math.round((r.botMessages / r.totalMessages) * 100) : 0;
  var aiResolveRate = r.userMessages > 0 ? Math.round(((r.botMessages) / (r.botMessages + r.managerMessages)) * 100) : 0;
  var escalationCount = r.categories.escalation ? r.categories.escalation.count : 0;
  var escalationRate = r.userMessages > 0 ? Math.round((escalationCount / r.userMessages) * 100) : 0;

  var html = '<div class="grid">';
  html += card('총 상담', r.totalChats, '건', 'blue', r.period);
  html += card('고객 메시지', r.userMessages, '건', 'blue', '총 ' + r.totalMessages + '건 중');
  html += card('AI 봇 응답', r.botMessages, '건', 'green', '응답 비율 ' + botRate + '%');
  html += card('매니저 응답', r.managerMessages, '건', 'yellow', 'AI 해결률 ' + aiResolveRate + '%');
  html += card('미해결 상담', r.unresolvedChats, '건', r.unresolvedChats > 10 ? 'red' : 'green', r.unresolvedChats > 10 ? '우선 처리 필요' : '양호');
  html += card('에스컬레이션', escalationCount, '건', escalationRate > 20 ? 'red' : 'yellow', '비율 ' + escalationRate + '%');
  html += '</div>';

  html += '<div class="charts">';
  html += categoryChart(r.categories);
  html += keywordChart(r.topKeywords);
  html += hourChart(r.hourlyDistribution);
  html += messageBreakdown(r);
  html += '</div>';

  html += '<div class="insights">' + insightsCard(r) + '</div>';

  // Load additional dashboard data
  Promise.all([
    fetch('/api/analytics/csat?days=' + days).then(function(r) { return r.json(); }).catch(function() { return null; }),
    fetch('/api/analytics/shipping?days=' + days).then(function(r) { return r.json(); }).catch(function() { return null; }),
    fetch('/api/analytics/faq-log').then(function(r) { return r.json(); }).catch(function() { return null; }),
    fetch('/api/analytics/auto-close').then(function(r) { return r.json(); }).catch(function() { return null; }),
    fetch('/api/analytics/manager-performance?days=' + days).then(function(r) { return r.json(); }).catch(function() { return null; }),
    fetch('/api/analytics/ai-conversations?limit=30').then(function(r) { return r.json(); }).catch(function() { return null; })
  ]).then(function(results) {
    var csat = results[0];
    var shipping = results[1];
    var faqLog = results[2];
    var autoClose = results[3];
    var mgrPerf = results[4];
    var aiConv = results[5];

    var extra = '<div class="grid" style="margin-top:8px;padding:0 32px 16px;">';

    // CSAT card
    if (csat && csat.success) {
      var starColor = csat.averageScore >= 4 ? 'green' : csat.averageScore >= 3 ? 'yellow' : 'red';
      extra += card('CSAT 평균점수', csat.averageScore || '-', '/ 5', starColor, csat.totalResponses + '건 응답');
    }

    // Shipping tracker card
    if (shipping && shipping.success) {
      extra += card('배송 추적', shipping.trackedItems, '개 아이템', 'blue', shipping.notifications.sent + '건 알림 발송');
    }

    // FAQ update card
    if (faqLog && faqLog.success && faqLog.lastUpdate) {
      var lu = faqLog.lastUpdate;
      var faqDate = lu.timestamp ? lu.timestamp.substring(0, 10) : '-';
      extra += card('FAQ 자동생성', lu.faqsGenerated || 0, '개', 'purple', '최근: ' + faqDate);
    }

    // Auto-close card
    if (autoClose && autoClose.success) {
      extra += card('CSAT 대기중', autoClose.csatPending, '건', autoClose.csatPending > 10 ? 'yellow' : 'green', '24h 후 자동종료');
    }

    extra += '</div>';

    // CSAT distribution chart
    if (csat && csat.success && csat.totalResponses > 0) {
      extra += '<div class="charts" style="padding:0 32px 16px;">';
      extra += '<div class="chart-card"><h3>CSAT 만족도 분포</h3><div class="bar-chart">';
      var csatLabels = { 5: '⭐⭐⭐⭐⭐ 매우만족', 4: '⭐⭐⭐⭐ 만족', 3: '⭐⭐⭐ 보통', 2: '⭐⭐ 불만족', 1: '⭐ 매우불만족' };
      var csatColors = { 5: '#22c55e', 4: '#84cc16', 3: '#eab308', 2: '#f97316', 1: '#ef4444' };
      var csatMax = Math.max(csat.distribution[1]||0, csat.distribution[2]||0, csat.distribution[3]||0, csat.distribution[4]||0, csat.distribution[5]||0, 1);
      for (var s = 5; s >= 1; s--) {
        var cnt = csat.distribution[s] || 0;
        var pct = Math.round((cnt / csatMax) * 100);
        extra += '<div class="bar-row"><div class="bar-label" style="width:160px;">' + csatLabels[s] + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + csatColors[s] + ';"></div><span class="bar-count">' + cnt + '</span></div></div>';
      }
      extra += '</div></div>';

      // Shipping status distribution
      if (shipping && shipping.success) {
        var statusNames = { PAYMENT_COMPLETED: '결제완료', PAYMENT_WAITING: '결제대기', ORDER_PROCESSING: '주문처리중', SHIPPING_TO_BDJ: '물류센터이동', SHIPPING_TO_HOME: '국제배송중', COMPLETED: '배송완료', CANCEL_COMPLETED: '취소완료' };
        var statusColors = { PAYMENT_COMPLETED: '#3b82f6', PAYMENT_WAITING: '#94a3b8', ORDER_PROCESSING: '#eab308', SHIPPING_TO_BDJ: '#f97316', SHIPPING_TO_HOME: '#a855f7', COMPLETED: '#22c55e', CANCEL_COMPLETED: '#ef4444' };
        var sKeys = Object.keys(shipping.statusDistribution);
        if (sKeys.length > 0) {
          var sMax = 1;
          sKeys.forEach(function(k) { if (shipping.statusDistribution[k] > sMax) sMax = shipping.statusDistribution[k]; });
          extra += '<div class="chart-card"><h3>배송 상태 분포 (추적중)</h3><div class="bar-chart">';
          sKeys.sort(function(a, b) { return shipping.statusDistribution[b] - shipping.statusDistribution[a]; });
          sKeys.forEach(function(k) {
            var cnt2 = shipping.statusDistribution[k];
            var pct2 = Math.round((cnt2 / sMax) * 100);
            extra += '<div class="bar-row"><div class="bar-label" style="width:140px;">' + (statusNames[k] || k) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct2 + '%;background:' + (statusColors[k] || '#64748b') + ';"></div><span class="bar-count">' + cnt2 + '</span></div></div>';
          });
          extra += '</div></div>';
        }
      }
      extra += '</div>';
    }

    
    // Manager performance table
    if (mgrPerf && mgrPerf.success && mgrPerf.managers.length > 0) {
      extra += '<div class="charts" style="padding:0 32px 16px;">';
      extra += '<div class="chart-card" style="grid-column: span 2;"><h3>매니저 성과 분석 (' + (typeof days === 'number' ? days : 7) + '일)</h3>';
      extra += '<table style="width:100%;border-collapse:collapse;margin-top:12px;font-size:14px;">';
      extra += '<tr style="border-bottom:1px solid #334155;color:#94a3b8;"><th style="text-align:left;padding:8px;">매니저 (이메일)</th><th>답변 수</th><th>담당 채팅</th><th>평균 답변길이</th><th>평균 응답시간</th><th>CS 점수</th></tr>';
      mgrPerf.managers.forEach(function(m) {
        var rtText = m.avgResponseTimeMin > 0 ? m.avgResponseTimeMin + '분' : '-';
        var rtColor = m.avgResponseTimeMin > 30 ? '#ef4444' : m.avgResponseTimeMin > 10 ? '#eab308' : '#22c55e';
        var rowBg = m.status === 'inactive' ? 'background:rgba(239,68,68,0.1);' : '';
        extra += '<tr style="border-bottom:1px solid #1e293b;' + rowBg + '"><td style="padding:8px;color:#e2e8f0;">' + m.name + '</td><td style="text-align:center;color:#3b82f6;font-weight:600;">' + m.totalReplies + '</td><td style="text-align:center;color:#a855f7;">' + m.uniqueChats + '</td><td style="text-align:center;color:#94a3b8;">' + m.avgReplyLength + '자</td><td style="text-align:center;color:' + rtColor + ';font-weight:600;">' + rtText + '</td><td style="text-align:center;font-weight:700;color:' + (m.qualityScore && m.qualityScore.total >= 65 ? '#22c55e' : m.qualityScore && m.qualityScore.total >= 50 ? '#eab308' : '#ef4444') + ';">' + (m.qualityScore ? m.qualityScore.total + '/100 (' + m.qualityScore.grade + ')' : '-') + '</td></tr>';
      });
      extra += '</table>';
      extra += '<div style="margin-top:12px;font-size:12px;color:#64748b;">총 ' + mgrPerf.summary.totalManagers + '명 매니저 | ' + mgrPerf.summary.totalReplies + '건 답변 | ' + mgrPerf.summary.totalChats + '건 채팅</div>';
      extra += '</div></div>';
    }

    
    // AI Conversation Log
    if (aiConv && aiConv.success && aiConv.conversations.length > 0) {
      extra += '<div style="padding:0 32px 16px;">';
      extra += '<div class="chart-card"><h3>AI 대화 모니터링 (최근 30건)</h3>';
      
      // Stats summary
      if (aiConv.stats) {
        var st = aiConv.stats;
        extra += '<div style="display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;">';
        extra += '<div style="background:#0f172a;padding:8px 16px;border-radius:8px;"><span style="color:#94a3b8;font-size:12px;">오늘</span> <strong style="color:#3b82f6;">' + (st.today || 0) + '</strong></div>';
        extra += '<div style="background:#0f172a;padding:8px 16px;border-radius:8px;"><span style="color:#94a3b8;font-size:12px;">전체</span> <strong style="color:#22c55e;">' + (st.total || 0) + '</strong></div>';
        extra += '<div style="background:#0f172a;padding:8px 16px;border-radius:8px;"><span style="color:#94a3b8;font-size:12px;">에스컬레이션</span> <strong style="color:#ef4444;">' + (st.escalatedRate || 0) + '%</strong></div>';
        extra += '</div>';
      }

      extra += '<div style="max-height:600px;overflow-y:auto;">';
      extra += '<table style="width:100%;border-collapse:collapse;font-size:13px;">';
      extra += '<tr style="border-bottom:1px solid #334155;color:#94a3b8;position:sticky;top:0;background:#1e293b;"><th style="text-align:left;padding:8px;">시간</th><th style="text-align:left;">유형</th><th style="text-align:left;">고객 질문</th><th style="text-align:left;">AI 답변</th><th>상태</th></tr>';
      
      aiConv.conversations.forEach(function(c) {
        var time = c.timestamp ? c.timestamp.substring(11, 16) : '-';
        var date = c.timestamp ? c.timestamp.substring(5, 10) : '';
        var typeColors = { ai_answer: '#22c55e', order_lookup: '#3b82f6', greeting: '#94a3b8', unanswered: '#ef4444', escalation: '#eab308' };
        var typeNames = { ai_answer: 'AI답변', order_lookup: '주문조회', greeting: '인사', unanswered: '미답변', escalation: '에스컬레이션' };
        var typeColor = typeColors[c.type] || '#94a3b8';
        var typeName = typeNames[c.type] || c.type;
        var statusIcon = c.escalated ? '🔴' : '🟢';
        var userMsg = (c.userMessage || '').substring(0, 60) + ((c.userMessage || '').length > 60 ? '...' : '');
        var aiResp = (c.aiResponse || '').substring(0, 80) + ((c.aiResponse || '').length > 80 ? '...' : '');
        
        extra += '<tr style="border-bottom:1px solid #0f172a;cursor:pointer;" onclick="showReview(\'' + encodeURIComponent(JSON.stringify(c)) + '\')" title="클릭하여 상세보기 + 평가">';
        extra += '<td style="padding:8px;color:#64748b;white-space:nowrap;">' + date + ' ' + time + '</td>';
        extra += '<td style="padding:8px;"><span style="color:' + typeColor + ';font-weight:600;">' + typeName + '</span></td>';
        extra += '<td style="padding:8px;color:#e2e8f0;">' + userMsg + '</td>';
        extra += '<td style="padding:8px;color:#94a3b8;">' + aiResp + '</td>';
        extra += '<td style="text-align:center;">' + statusIcon + '</td>';
        extra += '</tr>';
      });
      
      extra += '</table></div></div></div>';
    }

    document.getElementById('content').innerHTML += extra;
  });
  document.getElementById('content').innerHTML = html;
}
function card(label, value, unit, color, sub) {
  return '<div class="card"><div class="label">' + label + '</div><div class="value ' + color + '">' + value + '<span style="font-size:16px;color:#64748b;"> ' + unit + '</span></div><div class="sub">' + sub + '</div></div>';
}
function categoryChart(cats) {
  var items = [];
  var catKeys = Object.keys(cats);
  for (var i = 0; i < catKeys.length; i++) {
    if (cats[catKeys[i]].count > 0) items.push({ key: catKeys[i], name: cats[catKeys[i]].name + ' ' + cats[catKeys[i]].nameKo, count: cats[catKeys[i]].count });
  }
  items.sort(function(a, b) { return b.count - a.count; });
  var max = items.length > 0 ? items[0].count : 1;
  var colors = ['#3b82f6','#22c55e','#eab308','#ef4444','#a855f7','#06b6d4','#f97316','#ec4899','#84cc16','#6366f1'];
  var h = '<div class="chart-card"><h3>문의 카테고리 분포</h3><div class="bar-chart">';
  for (var j = 0; j < items.length; j++) {
    var pct = Math.round((items[j].count / max) * 100);
    h += '<div class="bar-row"><div class="bar-label">' + items[j].name.split(' ')[1] + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + colors[j % colors.length] + ';"></div><span class="bar-count">' + items[j].count + '</span></div></div>';
  }
  h += '</div></div>';
  return h;
}
function keywordChart(keywords) {
  var h = '<div class="chart-card"><h3>자주 언급된 키워드 TOP 10</h3><ul class="keyword-list">';
  var kws = keywords.slice(0, 10);
  for (var i = 0; i < kws.length; i++) {
    var word = kws[i].word.length > 20 ? kws[i].word.substring(0, 20) + '...' : kws[i].word;
    h += '<li><span class="kw">' + (i + 1) + '. ' + word + '</span><span class="kc">' + kws[i].count + '</span></li>';
  }
  h += '</ul></div>';
  return h;
}
function hourChart(dist) {
  var max = 1;
  for (var hh = 0; hh < 24; hh++) { if ((dist[hh] || 0) > max) max = dist[hh]; }
  var h = '<div class="chart-card"><h3>시간대별 문의 (대만 시간)</h3><div class="hour-chart">';
  for (var hh = 0; hh < 24; hh++) {
    var c = dist[hh] || 0;
    var w = Math.round((c / max) * 100);
    h += '<div class="hour-row"><div class="hour-label">' + (hh < 10 ? '0' : '') + hh + ':00</div><div class="hour-bar" style="width:' + w + '%;' + (c === max ? 'background:#ef4444;' : '') + '"></div><div class="hour-count">' + (c > 0 ? c : '') + '</div></div>';
  }
  h += '</div></div>';
  return h;
}
function messageBreakdown(r) {
  var total = r.botMessages + r.managerMessages;
  var botPct = total > 0 ? Math.round((r.botMessages / total) * 100) : 0;
  var mgrPct = 100 - botPct;
  var h = '<div class="chart-card"><h3>AI vs 매니저 응답 비율</h3>';
  h += '<div style="display:flex;height:24px;border-radius:12px;overflow:hidden;margin:20px 0;">';
  h += '<div style="width:' + botPct + '%;background:#22c55e;"></div>';
  h += '<div style="width:' + mgrPct + '%;background:#eab308;"></div>';
  h += '</div>';
  h += '<div style="display:flex;justify-content:space-between;font-size:14px;">';
  h += '<span style="color:#22c55e;">AI 봇 ' + botPct + '% (' + r.botMessages + '건)</span>';
  h += '<span style="color:#eab308;">매니저 ' + mgrPct + '% (' + r.managerMessages + '건)</span>';
  h += '</div>';
  h += '<div style="margin-top:20px;padding-top:16px;border-top:1px solid #334155;font-size:13px;color:#94a3b8;">';
  h += '<p>AI 자동 응답률이 높을수록 CS 효율이 좋습니다.</p>';
  h += '<p style="margin-top:8px;">목표: AI 응답률 70% 이상</p>';
  h += '</div></div>';
  return h;
}
function insightsCard(r) {
  var insights = [];
  var catKeys = Object.keys(r.categories);
  var topCat = { key: '', count: 0 };
  for (var i = 0; i < catKeys.length; i++) {
    if (catKeys[i] !== 'other' && catKeys[i] !== 'escalation' && r.categories[catKeys[i]].count > topCat.count) {
      topCat = { key: catKeys[i], count: r.categories[catKeys[i]].count, name: r.categories[catKeys[i]].nameKo };
    }
  }
  if (topCat.count > 0) insights.push('📊 가장 많은 문의 카테고리: <strong>' + topCat.name + '</strong> (' + topCat.count + '건) — 해당 FAQ를 강화하면 AI 해결률을 높일 수 있습니다.');
  if (r.unresolvedChats > 10) insights.push('⚠️ 미해결 상담 <strong>' + r.unresolvedChats + '건</strong> — 오래된 상담부터 우선 처리하거나 자동 종료 규칙 설정을 권장합니다.');
  var escCount = r.categories.escalation ? r.categories.escalation.count : 0;
  if (escCount > 20) insights.push('🔄 에스컬레이션 <strong>' + escCount + '건</strong> — "客服" 키워드가 가장 많습니다. AI 프롬프트에서 직접 해결을 유도하도록 개선하면 줄일 수 있습니다.');
  var aiRate = Math.round((r.botMessages / (r.botMessages + r.managerMessages)) * 100);
  if (aiRate >= 70) insights.push('✅ AI 응답률 <strong>' + aiRate + '%</strong> — 목표(70%) 달성! 우수한 자동화 수준입니다.');
  else insights.push('📈 AI 응답률 <strong>' + aiRate + '%</strong> — 목표 70%까지 ' + (70 - aiRate) + '%p 개선이 필요합니다. FAQ 보강과 프롬프트 최적화를 권장합니다.');
  var otherCount = r.categories.other ? r.categories.other.count : 0;
  if (otherCount > 50) insights.push('❓ 미분류 문의 <strong>' + otherCount + '건</strong> — 새로운 카테고리 추가 또는 키워드 확장이 필요합니다.');

  var h = '<div class="insights-card"><h3>AI 인사이트 & 개선 제안</h3>';
  for (var j = 0; j < insights.length; j++) {
    h += '<div class="insight-item">' + insights[j] + '</div>';
  }
  h += '</div>';
  return h;
}
loadData();
</script>

<div id="reviewModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:9999;overflow-y:auto;" onclick="if(event.target===this)closeReview()">
  <div style="max-width:700px;margin:40px auto;background:#1e293b;border-radius:16px;padding:24px;border:1px solid #334155;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 style="color:#e2e8f0;margin:0;">AI 답변 상세 / 평가</h3>
      <span style="cursor:pointer;color:#94a3b8;font-size:24px;" onclick="closeReview()">&times;</span>
    </div>
    <div id="reviewContent"></div>
  </div>
</div>
<script>
function showReview(encoded) {
  var c = JSON.parse(decodeURIComponent(encoded));
  var html = '';
  html += '<div style="margin-bottom:16px;padding:12px;background:#0f172a;border-radius:8px;border-left:3px solid #3b82f6;">';
  html += '<div style="color:#64748b;font-size:12px;margin-bottom:4px;">고객 질문 (' + (c.lang || '-') + ') | ' + (c.timestamp || '').substring(0, 19).replace('T', ' ') + '</div>';
  html += '<div style="color:#e2e8f0;font-size:15px;">' + (c.userMessage || '-') + '</div>';
  if (c.userName) html += '<div style="color:#64748b;font-size:11px;margin-top:4px;">고객: ' + c.userName + '</div>';
  html += '</div>';
  html += '<div style="margin-bottom:16px;padding:12px;background:#0f172a;border-radius:8px;border-left:3px solid ' + (c.escalated ? '#ef4444' : '#22c55e') + ';">';
  html += '<div style="color:#64748b;font-size:12px;margin-bottom:4px;">AI 답변 (' + (c.type || '-') + ')' + (c.escalated ? ' <span style=\"color:#ef4444\">에스컬레이션</span>' : '') + '</div>';
  html += '<div style="color:#e2e8f0;font-size:14px;white-space:pre-wrap;line-height:1.6;">' + (c.aiResponse || '-') + '</div>';
  html += '</div>';
  html += '<div style="margin-bottom:12px;color:#94a3b8;font-size:13px;">이 AI 답변의 품질을 평가해주세요:</div>';
  html += '<div style="display:flex;gap:8px;margin-bottom:16px;">';
  html += '<button onclick="submitReview(\'' + encodeURIComponent(JSON.stringify(c)) + '\', \'good\')" style="flex:1;padding:12px;background:#166534;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;">✅ 정확함</button>';
  html += '<button onclick="submitReview(\'' + encodeURIComponent(JSON.stringify(c)) + '\', \'bad\')" style="flex:1;padding:12px;background:#991b1b;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;">❌ 부정확</button>';
  html += '<button onclick="submitReview(\'' + encodeURIComponent(JSON.stringify(c)) + '\', \'fix\')" style="flex:1;padding:12px;background:#92400e;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;">🔧 수정필요</button>';
  html += '</div>';
  html += '<textarea id="reviewComment" placeholder="(선택) 코멘트 - 어떤 부분이 잘못됐는지 메모" style="width:100%;height:60px;background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:8px;padding:8px;font-size:13px;resize:none;box-sizing:border-box;"></textarea>';
  document.getElementById('reviewContent').innerHTML = html;
  document.getElementById('reviewModal').style.display = 'block';
}
function closeReview() { document.getElementById('reviewModal').style.display = 'none'; }
function submitReview(encoded, rating) {
  var c = JSON.parse(decodeURIComponent(encoded));
  var comment = document.getElementById('reviewComment').value;
  fetch('/api/analytics/ai-review', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chatId: c.chatId, timestamp: c.timestamp, rating: rating, comment: comment, userMessage: c.userMessage, aiResponse: c.aiResponse })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.success) {
      var msgs = { good: '✅ 정확함으로 평가됨', bad: '❌ 부정확으로 평가됨', fix: '🔧 수정필요로 평가됨' };
      document.getElementById('reviewContent').innerHTML = '<div style="text-align:center;padding:40px;"><div style="font-size:48px;margin-bottom:16px;">' + (rating === 'good' ? '✅' : rating === 'bad' ? '❌' : '🔧') + '</div><div style="color:#e2e8f0;font-size:18px;">' + msgs[rating] + '</div><div style="color:#64748b;margin-top:8px;">총 ' + d.totalReviews + '건 평가됨</div></div>';
      setTimeout(closeReview, 1500);
    }
  }).catch(function(e) { alert('Error: ' + e.message); });
}
</script>
