<!DOCTYPE html>
<html lang="ko">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEASLY CS Dashboard v2</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #f8fafc;
  --bg-secondary: #ffffff;
  --bg-tertiary: var(--border-primary);
  --bg-hover: var(--border-primary);
  --text-primary: #0f172a;
  --text-secondary: #1e293b;
  --text-muted: #64748b;
  --text-faint: #94a3b8;
  --border-primary: var(--border-primary);
  --border-secondary: var(--border-primary);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --accent-bg: #dbeafe;
  --gauge-track: var(--border-primary);
  --header-bg: linear-gradient(135deg, #ffffff 0%, var(--border-primary) 100%);
}

[data-theme="dark"] {
  --bg-primary: #0f172a;
  --bg-secondary: #1e293b;
  --bg-tertiary: #0f172a;
  --bg-hover: #334155;
  --text-primary: #f8fafc;
  --text-secondary: var(--border-primary);
  --text-muted: #94a3b8;
  --text-faint: #94a3b8;
  --border-primary: #334155;
  --border-secondary: #1e293b;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --accent: #3b82f6;
  --accent-hover: #60a5fa;
  --accent-bg: #1e3a5f;
  --gauge-track: #1e293b;
  --header-bg: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
}

body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-primary); color: var(--text-secondary); transition: background 0.3s, color 0.3s; }
.header { background: var(--header-bg); padding: 24px 32px; border-bottom: 1px solid var(--border-primary); display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 24px; color: var(--text-primary); }
.header p { color: var(--text-muted); margin-top: 4px; font-size: 14px; }
.header .version { color: var(--accent); font-size: 12px; background: var(--accent-bg); padding: 4px 10px; border-radius: 12px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.theme-toggle { background: var(--bg-secondary); border: 1px solid var(--border-primary); border-radius: 20px; padding: 6px 12px; cursor: pointer; font-size: 16px; transition: all 0.3s; display: flex; align-items: center; gap: 6px; }
.theme-toggle:hover { background: var(--bg-hover); }
.theme-toggle span { font-size: 11px; color: var(--text-muted); }
.tabs { display: flex; padding: 0 32px; border-bottom: 1px solid var(--border-primary); background: var(--bg-secondary); }
.tab { padding: 12px 20px; font-size: 14px; color: var(--text-faint); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab:hover { color: var(--text-secondary); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.controls { padding: 16px 32px; display: flex; gap: 12px; align-items: center; }
.controls select, .controls button { background: var(--bg-secondary); color: var(--text-secondary); border: 1px solid var(--border-primary); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; }
.controls button { background: var(--accent); color: #fff; border: none; font-weight: 600; }
.controls button:hover { background: var(--accent-hover); }
.controls .auto-refresh { font-size: 12px; color: var(--text-muted); margin-left: auto; display: flex; align-items: center; gap: 6px; }
.controls .auto-refresh input { accent-color: var(--accent); }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; padding: 0 32px 16px; }
.card { background: var(--bg-secondary); border-radius: 12px; padding: 20px; border: 1px solid var(--border-primary); box-shadow: var(--shadow-sm); transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; position: relative; }
.card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.card-detail { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-primary); font-size: 12px; color: var(--text-muted); line-height: 1.6; }
.card-detail.open { display: block; }
.card-arrow { position: absolute; top: 12px; right: 12px; font-size: 10px; color: var(--text-faint); transition: transform 0.2s; }
.card-arrow.open { transform: rotate(180deg); }
.card .label { font-size: 12px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 1px; }
.card .value { font-size: 28px; font-weight: 700; margin-top: 8px; }
.card .sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
.blue { color: #3b82f6; }
.green { color: #22c55e; }
.yellow { color: #eab308; }
.red { color: #ef4444; }
.purple { color: #a855f7; }
.cyan { color: #06b6d4; }
.charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 0 32px 16px; }
.chart-card { background: var(--bg-secondary); border-radius: 12px; padding: 20px; border: 1px solid var(--border-primary); box-shadow: var(--shadow-sm); }
.chart-card h3 { font-size: 16px; margin-bottom: 16px; color: var(--text-primary); }
.chart-card.full { grid-column: span 2; }
.bar-chart .bar-row { display: flex; align-items: center; margin-bottom: 8px; }
.bar-chart .bar-label { width: 120px; font-size: 13px; color: var(--text-secondary); flex-shrink: 0; }
.bar-chart .bar-track { flex: 1; height: 24px; background: var(--bg-tertiary); border-radius: 4px; overflow: hidden; position: relative; }
.bar-chart .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.bar-chart .bar-count { font-size: 12px; color: var(--text-secondary); position: absolute; right: 8px; top: 4px; }
.keyword-list { list-style: none; }
.keyword-list li { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-secondary); font-size: 14px; }
.keyword-list .kw { color: var(--text-secondary); }
.keyword-list .kc { color: var(--accent); font-weight: 600; }
.hour-chart .hour-row { display: flex; align-items: center; margin-bottom: 2px; }
.hour-chart .hour-label { width: 50px; font-size: 11px; color: var(--text-faint); text-align: right; padding-right: 8px; }
.hour-chart .hour-bar { height: 16px; background: var(--accent); border-radius: 2px; transition: width 0.6s ease; min-width: 2px; }
.hour-chart .hour-count { font-size: 11px; color: var(--text-secondary); margin-left: 6px; }
.insights { padding: 0 32px 16px; }
.insights-card { background: var(--bg-secondary); border-radius: 12px; padding: 20px; border: 1px solid var(--border-primary); }
.insights-card h3 { font-size: 16px; margin-bottom: 16px; color: var(--text-primary); }
.insight-item { padding: 12px 0; border-bottom: 1px solid var(--border-secondary); font-size: 14px; line-height: 1.6; }
.insight-item:last-child { border-bottom: none; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 10px 8px; color: var(--text-faint); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border-primary); }
td { padding: 10px 8px; border-bottom: 1px solid var(--border-secondary); font-size: 13px; color: var(--text-secondary); }
.score-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
.score-high { background: rgba(34,197,94,0.15); color: #22c55e; }
.score-mid { background: rgba(234,179,8,0.15); color: #eab308; }
.score-low { background: rgba(239,68,68,0.15); color: #ef4444; }
.radar-scores { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 12px 0; }
.radar-item { text-align: center; padding: 8px 4px; background: var(--bg-tertiary); border-radius: 8px; }
.radar-item .radar-val { font-size: 20px; font-weight: 700; }
.radar-item .radar-lbl { font-size: 10px; color: var(--text-faint); margin-top: 2px; }
.section-title { padding: 16px 32px 8px; font-size: 18px; font-weight: 600; color: var(--text-primary); }
.tab-content { display: none; }
.tab-content.active { display: block; }
.loading { text-align: center; padding: 60px; color: var(--text-faint); font-size: 18px; }
.pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
@media (max-width: 768px) { .charts { grid-template-columns: 1fr; } .grid { grid-template-columns: repeat(2, 1fr); } .chart-card.full { grid-column: span 1; } .radar-scores { grid-template-columns: repeat(3, 1fr); } }
.metric-tip { display:none; margin-top:10px; padding:10px; background:var(--bg-tertiary); border-radius:8px; font-size:12px; color:var(--text-muted); line-height:1.6; border:1px solid var(--border-primary); }

/* === Strategic Dashboard v3 Compact === */
.strat-section { margin-top:24px; padding:20px 32px 0; border-top:2px solid var(--border-primary); }
.strat-title { color:var(--text-primary); font-size:18px; font-weight:700; margin:0 0 16px; }
.strat-score-row { display:flex; gap:16px; align-items:stretch; margin-bottom:16px; }
.strat-gauge-box { flex:0 0 180px; background:var(--bg-secondary); box-shadow:var(--shadow-sm); border-radius:12px; padding:16px; text-align:center; border:1px solid var(--border-primary); }
.strat-gauge-box canvas { display:block; margin:0 auto; }
.strat-gauge-val { font-size:32px; font-weight:800; margin-top:4px; text-shadow: 0 0 20px currentColor, 0 2px 4px rgba(0,0,0,0.5); letter-spacing: -1px; }
.strat-gauge-label { font-size:12px; color:var(--text-secondary); font-weight:600; }
.strat-subs { flex:1; display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
.strat-sub { background:var(--bg-secondary); box-shadow:var(--shadow-sm); border-radius:10px; padding:10px 12px; cursor:pointer; border-left:3px solid var(--border-primary); transition:all 0.2s; border:1px solid var(--border-primary); border-left-width:3px; }
.strat-sub:hover { background:var(--bg-hover); }
.strat-sub .sub-icon { font-size:14px; }
.strat-sub .sub-name { font-size:11px; color:var(--text-secondary); margin-top:2px; }
.strat-sub .sub-score { font-size:20px; font-weight:800; margin:2px 0; }
.strat-sub .sub-detail { font-size:10px; color:var(--text-muted); display:none; margin-top:6px; padding-top:6px; border-top:1px solid var(--border-secondary); }
.strat-sub.expanded .sub-detail { display:block; }
.strat-sub.sev-red { border-left-color:#ef4444; }
.strat-sub.sev-yellow { border-left-color:#eab308; }
.strat-sub.sev-green { border-left-color:#22c55e; }
.strat-two-col { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
.strat-panel { background:var(--bg-secondary); box-shadow:var(--shadow-sm); border-radius:12px; padding:16px; border:1px solid var(--border-primary); }
.strat-panel h3 { color:var(--text-primary); font-size:14px; margin:0 0 12px; }
.prob-item { display:flex; align-items:flex-start; gap:8px; padding:8px 0; border-bottom:1px solid var(--border-secondary); cursor:pointer; }
.prob-item:last-child { border-bottom:none; }
.prob-rank { width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; color:#fff; flex-shrink:0; }
.prob-rank.crit { background:#ef4444; }
.prob-rank.warn { background:#eab308; }
.prob-rank.info { background:#3b82f6; }
.prob-text { flex:1; }
.prob-text .prob-title { font-size:12px; color:var(--text-secondary); font-weight:600; }
.prob-text .prob-sub { font-size:10px; color:var(--text-muted); margin-top:2px; display:none; }
.prob-item.expanded .prob-sub { display:block; }
.act-item { display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid var(--border-secondary); }
.act-item:last-child { border-bottom:none; }
.act-num { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; color:#fff; flex-shrink:0; }
.act-num.done { background:#22c55e; }
.act-num.prog { background:#3b82f6; }
.act-num.wait { background:#475569; }
.act-body { flex:1; }
.act-body .act-title { font-size:12px; color:var(--text-secondary); font-weight:600; }
.act-body .act-desc { font-size:10px; color:var(--text-muted); margin-top:1px; }
.act-body .act-target { font-size:10px; color:#38bdf8; margin-top:2px; }
.strat-bottom-row { display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-bottom:16px; }
.mgr-table { width:100%; border-collapse:collapse; }
.mgr-table th { font-size:10px; color:var(--text-faint); text-align:left; padding:6px 8px; border-bottom:1px solid var(--border-secondary); }
.mgr-table td { font-size:12px; color:var(--text-secondary); padding:8px; border-bottom:1px solid var(--border-secondary); }
.mgr-table tr:hover { background:var(--bg-hover); }
.mgr-badge { display:inline-block; padding:2px 6px; border-radius:4px; font-size:10px; font-weight:700; }
.mgr-badge.A { background:rgba(34,197,94,0.2); color:#22c55e; }
.mgr-badge.B { background:rgba(234,179,8,0.2); color:#eab308; }
.mgr-badge.C { background:rgba(239,68,68,0.2); color:#ef4444; }
.mgr-badge.D { background:rgba(239,68,68,0.3); color:#ef4444; }
.forecast-row { display:flex; gap:8px; }
.forecast-item { flex:1; text-align:center; padding:12px 8px; border-radius:8px; }
.forecast-item .fc-label { font-size:10px; color:var(--text-faint); }
.forecast-item .fc-val { font-size:22px; font-weight:800; margin:4px 0 2px; }
.forecast-item .fc-note { font-size:9px; color:var(--text-muted); }

</style>
</head>
<body>

<div class="header">
  <div>
    <h1>VEASLY CS AI Dashboard</h1>
    <p>CS 문의 분석 & AI 성과 & 매니저 품질 평가</p>
  </div>
  <div class="header-right">
  <span class="version">v3.0 Strategic</span>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="다크/라이트 전환">🌙 <span>Dark</span></button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('overview')">Overview</div>
  <div class="tab" onclick="switchTab('managers')">매니저 성과</div>
  <div class="tab" onclick="switchTab('ai')">AI 모니터링</div>
  <div class="tab" onclick="switchTab('csat')">CSAT</div>
  <div class="tab" onclick="switchTab('csscore')">CS Score</div>
</div>

<div class="controls">
  <select id="days">
    <option value="1">오늘</option>
    <option value="3">최근 3일</option>
    <option value="7" selected>최근 7일</option>
    <option value="14">최근 14일</option>
    <option value="30">최근 30일</option>
  </select>
  <button onclick="loadAllData()">조회</button>
  <div class="auto-refresh">
    <input type="checkbox" id="autoRefresh" onchange="toggleAutoRefresh()">
    <label for="autoRefresh">5분 자동 갱신</label>
    <span id="lastUpdate" style="margin-left:8px;"></span>
  </div>
</div>

<!-- TAB: Overview -->
<div id="tab-overview" class="tab-content active">
  <div id="overviewContent"><div class="loading">데이터 로딩 중...</div></div>
</div>

<!-- TAB: Managers -->
<div id="tab-managers" class="tab-content">
  <div id="managersContent"><div class="loading">매니저 데이터 로딩 중...</div></div>
</div>

<!-- TAB: AI Monitoring -->
<div id="tab-ai" class="tab-content">
  <div id="aiContent"><div class="loading">AI 데이터 로딩 중...</div></div>
</div>

<!-- TAB: CS Score -->
<div id="tab-csscore" class="tab-content">
  <div id="csscoreContent"><div class="loading">CS Score 데이터 로딩 중...</div></div>
      <!-- CS Score 트렌드 패널 -->
      <div id="csScoreTrendPanel" class="chart-card" style="margin-top:16px;">
        <h3 style="color:var(--text-primary);margin:0 0 12px;">📈 CS Score 트렌드 (30일)</h3>
        <div id="trend-status" style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;">로딩 중...</div>
        <div id="trend-bars" style="display:flex;align-items:flex-end;height:120px;gap:2px;border-bottom:1px solid var(--border-primary);padding-bottom:4px;"></div>
        <div id="trend-prediction" style="font-size:12px;color:var(--text-secondary);margin-top:8px;">예측 데이터 로딩 중...</div>
      </div>
      <!-- FAQ 추천 패널 -->
      <div id="faqRecPanel" class="chart-card" style="margin-top:16px;">
        <h3 style="color:var(--text-primary);margin:0 0 12px;">💡 FAQ 추가 추천</h3>
        <div id="faq-rec-content" style="font-size:13px;color:var(--text-secondary);">로딩 중...</div>
      </div>
      <!-- 비즈니스 메트릭 패널 -->
      <div id="bizMetricsPanel" class="chart-card" style="margin-top:16px;">
        <h3 style="color:var(--text-primary);margin:0 0 12px;">📊 비즈니스 메트릭</h3>
        <div id="biz-metrics-content" style="font-size:13px;color:var(--text-secondary);">로딩 중...</div>
      </div>
      <!-- 데이터 헬스 패널 -->
      <div id="health-content" class="chart-card" style="margin-top:16px;display:none;">
      </div>
</div>
</div>

<!-- TAB: CSAT -->
<div id="tab-csat" class="tab-content">
  <div id="csatContent"><div class="loading">CSAT 데이터 로딩 중...</div></div>
</div>

<!-- Review Modal -->
<div id="reviewModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:9999;overflow-y:auto;" onclick="if(event.target===this)closeReview()">
  <div style="max-width:700px;margin:40px auto;background:var(--bg-secondary);border-radius:16px;padding:24px;border:1px solid var(--border-primary);">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 style="color:var(--text-primary);margin:0;">AI 답변 상세 / 평가</h3>
      <span style="cursor:pointer;color:var(--text-faint);font-size:24px;" onclick="closeReview()">&times;</span>
    </div>
    <div id="reviewContent"></div>
  </div>
</div>

<script>
var API_BASE = window.location.origin;
var refreshTimer = null;
var cachedData = {};

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
  event.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'managers' && !cachedData.mgr) loadManagerData();
  if (name === 'ai' && !cachedData.ai) loadAIData();
  if (name === 'csat' && !cachedData.csat) loadCSATData();
  if (name === 'csscore' && !cachedData.csscore) loadCSScoreData();
  if (name === 'csscore') { setTimeout(function(){ loadCSScoreTrend(); loadFAQRecommendations(); }, 500); }
}

function toggleAutoRefresh() {
  if (document.getElementById('autoRefresh').checked) {
    refreshTimer = setInterval(loadAllData, 300000);
  } else {
    clearInterval(refreshTimer);
  }
}


function toggleTheme() {
  var html = document.documentElement;
  var btn = document.getElementById('themeBtn');
  if (html.getAttribute('data-theme') === 'dark') {
    html.removeAttribute('data-theme');
    btn.innerHTML = '🌙 <span>Dark</span>';
    localStorage.setItem('veasly-theme', 'light');
  } else {
    html.setAttribute('data-theme', 'dark');
    btn.innerHTML = '☀️ <span>Light</span>';
    localStorage.setItem('veasly-theme', 'dark');
  }
  // 게이지 다시 그리기
  var gaugeEl = document.getElementById('csGauge');
  if (gaugeEl && typeof drawGauge === 'function') {
    var scoreEl = document.querySelector('.strat-gauge-val');
    if (scoreEl) {
      var score = parseFloat(scoreEl.textContent) || 0;
      setTimeout(function() { drawGauge(score, 3); }, 100);
    }
  }
}

// 페이지 로드 시 저장된 테마 적용
(function() {
  var saved = localStorage.getItem('veasly-theme');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    var btn = document.getElementById('themeBtn');
    if (btn) btn.innerHTML = '☀️ <span>Light</span>';
  }
})();

function loadAllData() {
  cachedData = {};
  loadOverview();
  var activeTab = document.querySelector('.tab.active');
  if (activeTab) {
    var tabName = activeTab.textContent.trim();
    if (tabName.indexOf('매니저') > -1) loadManagerData();
    if (tabName.indexOf('AI') > -1) loadAIData();
    if (tabName.indexOf('CSAT') > -1) loadCSATData();
    if (tabName.indexOf('CS Score') > -1) loadCSScoreData();
  }
  document.getElementById('lastUpdate').textContent = new Date().toLocaleString('ko-KR');
}

// ===== OVERVIEW TAB =====
function loadOverview() {
  var days = document.getElementById('days').value;
  document.getElementById('overviewContent').innerHTML = '<div class="loading">분석 중...</div>';

  // === PHASE 1: v2 운영 카드 + 차트 (기본) ===
  Promise.all([
    fetch(API_BASE + '/api/analytics/report?days=' + days).then(function(r) { return r.json(); }),
    fetch('/api/analytics/auto-close').then(function(r) { return r.json(); }).catch(function() { return null; })
  ]).then(function(results) {
    var data = results[0];
    var autoClose = results[1];
    if (!data.success) throw new Error(data.error);
    var r = data.raw;
    cachedData.overview = r;

    var botRate = r.totalMessages > 0 ? Math.round((r.botMessages / r.totalMessages) * 100) : 0;
    var aiResolveRate = (r.botMessages + r.managerMessages) > 0 ? Math.round((r.botMessages / (r.botMessages + r.managerMessages)) * 100) : 0;
    var escalationCount = (r.categories.agent_direct ? r.categories.agent_direct.count : 0) + (r.categories.agent_request ? r.categories.agent_request.count : 0);
    var escalationRate = r.userMessages > 0 ? Math.round((escalationCount / r.userMessages) * 100) : 0;

    var html = '<div class="grid">';
    html += card('총 상담', r.totalChats, '건', 'blue', r.period, '📊 선택한 기간 동안 접수된 전체 상담 건수입니다.');
    html += card('AI 봇 응답', r.botMessages, '건', 'green', '응답률 ' + botRate + '%', '🤖 AI가 자동으로 처리한 메시지 수입니다.');
    html += card('매니저 응답', r.managerMessages, '건', 'yellow', 'AI 해결률 ' + aiResolveRate + '%', '👨‍💼 매니저가 직접 응답한 건수입니다.');
    html += card('에스컬레이션', escalationCount, '건', escalationRate > 20 ? 'red' : 'yellow', '비율 ' + escalationRate + '%', '🔺 AI가 처리하지 못해 매니저에게 전달된 건수입니다.');
    html += card('미해결 상담', r.unresolvedChats, '건', r.unresolvedChats > 10 ? 'red' : 'green', r.unresolvedChats > 10 ? '우선 처리 필요' : '양호', '⏳ 아직 종료되지 않은 열린 상담입니다.');
    if (r.channelStats) {
      var cs = r.channelStats;
      var chTotal = r.totalChats || (cs.line + cs.web + cs.other);
      html += card('LINE', cs.line, '건 (' + (chTotal > 0 ? (cs.line/chTotal*100).toFixed(0) : 0) + '%)', 'green', 'LINE 메신저', '💚 LINE 메신저를 통해 접수된 상담입니다.');
      html += card('웹사이트', cs.web, '건 (' + (chTotal > 0 ? (cs.web/chTotal*100).toFixed(0) : 0) + '%)', 'blue', 'veasly.com', '🌐 웹사이트 채팅을 통해 접수된 상담입니다.');
      if (cs.other > 0) {
        html += card('기타 채널', cs.other, '건 (' + (chTotal > 0 ? (cs.other/chTotal*100).toFixed(0) : 0) + '%)', 'yellow', 'API/이메일 등', '📨 기타 채널을 통해 접수된 상담입니다.');
      }
    }
    if (autoClose && autoClose.success) {
      html += card('CSAT 대기', autoClose.csatPending, '건', autoClose.csatPending > 10 ? 'yellow' : 'green', '24h 후 자동종료', '📋 CSAT 설문 발송 후 미응답 건수입니다.');
    }
    html += '</div>';

    html += '<div class="charts">';
    html += categoryChart(r.categories);
    html += keywordChart(r.topKeywords);
    html += hourChart(r.hourlyDistribution);
    html += messageBreakdown(r);
    html += '</div>';

    html += '<div class="insights">' + insightsCard(r) + '</div>';

    // 전략 섹션 placeholder
    html += '<div id="strategySection"><div class="loading">전략 분석 로딩 중...</div></div>';

    document.getElementById('overviewContent').innerHTML = html;

    // === PHASE 2: v3 전략 대시보드 (비동기 append) ===
    loadStrategySection(days);

  }).catch(function(e) {
    document.getElementById('overviewContent').innerHTML = '<div class="loading" style="color:#ef4444;">오류: ' + e.message + '</div>';
  });
}

function loadStrategySection(days) {
  Promise.all([
    fetch('/api/analytics/cs-score-metrics?days=' + days).then(function(r){return r.json();}).catch(function(){return null;}),
    fetch('/api/analytics/manager-performance?days=' + days).then(function(r){return r.json();}).catch(function(){return null;}),
    fetch('/api/analytics/escalation-analysis?days=' + days).then(function(r){return r.json();}).catch(function(){return null;}),
    fetch('/api/analytics/csat?days=' + days).then(function(r){return r.json();}).catch(function(){return null;})
  ]).then(function(res) {
    var el = document.getElementById('strategySection');
    if (!el) return;
    var m = res[0], mgr = res[1], esc = res[2], csat = res[3];
    var mgrData = (mgr && mgr.success && mgr.managers) ? mgr.managers : [];
    var csatData = csat && csat.success ? csat : null;
    if (!m || !m.success) { el.innerHTML = '<div style="padding:20px;color:#eab308;text-align:center;">전략 데이터 로딩 실패</div>'; return; }

    var sc = m.integratedScore || {};
    var bd = sc.breakdown || {};
    var totalScore = sc.score || 0;
    var scoreColor = totalScore >= 3 ? '#4ade80' : totalScore >= 2.5 ? '#fbbf24' : '#f87171';
    var h = '';

    h += '<div class="strat-section">';
    h += '<div class="strat-title">📊 CS 전략 대시보드</div>';

    h += '<div class="strat-gauge-box">';
    h += '<canvas id="csGauge" width="160" height="100"></canvas>';
    h += '<div class="strat-gauge-val" style="color:'+scoreColor+';">'+totalScore.toFixed(2)+'</div>';
    h += '<div class="strat-gauge-label">목표 '+(sc.target||3)+'.0</div>';
    h += '</div>';
    // 서브메트릭

      {name:'NoReply', score:(bd.noReply||{}).score||0, icon:'⏰', detail:'미응답 '+((m.noReplyClose||{}).rate||0)+'% ('+((m.noReplyClose||{}).count||0)+'/'+((m.noReplyClose||{}).total||0)+')'},
      {name:'FRT', score:(bd.frt||{}).score||0, icon:'⚡', detail:'30분내 '+((m.responseTime||{}).within30MinRate||0)+'% | 평균 '+((m.responseTime||{}).avgMinutes||0)+'분'},
      {name:'FCR', score:(bd.fcr||{}).score||0, icon:'✅', detail:'해결 '+((m.fcr||{}).resolved||0)+'건 | 재문의 '+((m.fcr||{}).reopened||0)+'건'},
      {name:'CSAT', score:(bd.csat||{}).score||0, icon:'⭐', detail:'평균 '+(csatData&&(csatData.averageScore||csatData.average)?((csatData.averageScore||csatData.average)).toFixed(1):'N/A')+' | 응답 '+(csatData&&(csatData.totalResponses||csatData.total)?(csatData.totalResponses||csatData.total):0)+'건'},
      {name:'CES', score:(bd.ces||{}).score||0, icon:'🎯', detail:'평균 '+((m.ces||{}).avgScore||0)+' | 응답 '+((m.ces||{}).totalResponses||(m.ces||{}).count||0)+'건'}
    ];
    h += '<div class="strat-subs">';
    for (var i=0; i<metrics.length; i++) {
      var met = metrics[i];
      var mc = met.score >= 3 ? '#4ade80' : met.score >= 2.5 ? '#fbbf24' : '#f87171';

    var noReplyR = (m.noReplyClose||{}).rate || 0;
    var csatAvgD = csatData && (csatData.averageScore || csatData.average) ? (csatData.averageScore || csatData.average) : 0;
    var csatTotalD = csatData && (csatData.totalResponses || csatData.total) ? (csatData.totalResponses || csatData.total) : 0;
    var cesCountD = (m.ces||{}).totalResponses || (m.ces||{}).count || 0;
    var fcrResolvedD = (m.fcr||{}).resolved || 0;
    var frtRateD = (m.responseTime||{}).within30MinRate || 0;

    else if (escRate > 30) problems.push({sev:'warn', title:'에스컬레이션 '+escRate+'%', sub:'목표 30%에 근접 중'});
    // NoReply
    if (noReplyR > 25) problems.push({sev:'crit', title:'NoReply 미응답 '+noReplyR+'%', sub:'목표 15% 이하. 오프시간 AI 강화 필요'});
    else if (noReplyR > 15) problems.push({sev:'warn', title:'NoReply 미응답 '+noReplyR+'%', sub:'목표 15%에 근접 중'});
    // FRT
    if (frtRateD < 50) problems.push({sev:'crit', title:'FRT 30분내 '+frtRateD+'%', sub:'목표 80%. 평균 '+ ((m.responseTime||{}).avgMinutes||0) +'분'});
    else if (frtRateD < 80) problems.push({sev:'warn', title:'FRT 30분내 '+frtRateD+'%', sub:'목표 80%. 개선 진행 중'});
    // CSAT
    if (csatAvgD > 0 && csatAvgD > 2.5) problems.push({sev:'crit', title:'CSAT 평균 '+csatAvgD.toFixed(1)+' (1=최고)', sub:'응답 '+csatTotalD+'건. 목표 2.0 이하'});
    else if (csatAvgD > 0 && csatAvgD > 2.0) problems.push({sev:'warn', title:'CSAT 평균 '+csatAvgD.toFixed(1)+' (1=최고)', sub:'응답 '+csatTotalD+'건. 양호하지만 개선 여지'});
    else if (csatTotalD < 10) problems.push({sev:'warn', title:'CSAT 응답 '+csatTotalD+'건', sub:'샘플 부족. 최소 20건 이상 필요'});
    // CES/FCR 데이터

    // 문제 없으면

    // 최대 5개
    problems = problems.slice(0, 5);
    for (var p=0; p<problems.length; p++) {
      var pr = problems[p];
      h += '<div class="prob-item" onclick="this.classList.toggle(\'expanded\')">';

    // 2. FRT/NoReply
    var frtSt = frtRateD >= 80 ? 'done' : frtRateD >= 50 ? 'prog' : 'wait';
    actions.push({st:frtSt, title:'FRT '+frtRateD+'%→80%', desc:'오프시간 AI선응답, 알림 체계', target:'NoReply '+noReplyR+'%→15%'});

  });
}

function drawGauge(score, target) {
  var canvas = document.getElementById('csGauge');
  if (!canvas || !canvas.getContext) return;
  var ctx = canvas.getContext('2d');
  var w = canvas.width, h = canvas.height;
  var cx = w/2, cy = h - 10;
  var r = Math.min(cx, cy) - 10;

  ctx.clearRect(0, 0, w, h);

  // 배경 호
  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, 0, false);
  ctx.lineWidth = 18;
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--gauge-track').trim() || (document.documentElement.getAttribute('data-theme')==='dark' ? '#334155' : 'var(--border-primary)');
  ctx.stroke();

  // 점수 호
  var pct = Math.min(score / 5, 1);
  var endAngle = Math.PI + (Math.PI * pct);
  var color = score >= 3 ? '#4ade80' : score >= 2.5 ? '#fbbf24' : '#f87171';
  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, endAngle, false);
  ctx.lineWidth = 18;
  ctx.strokeStyle = color;
  ctx.lineCap = 'round';
  ctx.stroke();

  // 목표 마커
  var tPct = Math.min(target / 5, 1);
  var tAngle = Math.PI + (Math.PI * tPct);
  var mx = cx + r * Math.cos(tAngle);
  var my = cy + r * Math.sin(tAngle);
  ctx.beginPath();
  ctx.arc(mx, my, 4, 0, 2 * Math.PI);
  ctx.fillStyle = '#38bdf8';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(mx, my, 7, 0, 2 * Math.PI);
  ctx.strokeStyle = '#38bdf8';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}



function loadManagerData() {
  var days = document.getElementById('days').value;
  document.getElementById('managersContent').innerHTML = '<div class="loading">매니저 성과 분석 중...</div>';
  
  Promise.all([
    fetch('/api/analytics/manager-performance?days=' + days).then(function(r) { return r.json(); }),
    fetch('/api/analytics/ai-reviews').then(function(r) { return r.json(); }).catch(function() { return null; })
  ]).then(function(results) {
    var mgrPerf = results[0];
    var aiReviews = results[1];
    cachedData.mgr = true;

    if (!mgrPerf || !mgrPerf.success) {
      document.getElementById('managersContent').innerHTML = '<div class="loading" style="color:#ef4444;">매니저 데이터 로드 실패</div>';
      return;
    }

    var html = '';

    // AI Quality Review Summary Cards
    var reviewData = {};
    if (aiReviews && aiReviews.recent) {
      aiReviews.recent.forEach(function(rev) {
        // Only process AI auto-scored reviews (have scores.totalScore)
        if (!rev.scores || !rev.scores.totalScore) return;
        if (!rev.managerId) return;
        if (!reviewData[rev.managerId]) reviewData[rev.managerId] = { scores: [], count: 0 };
        reviewData[rev.managerId].scores.push(rev.scores);
        reviewData[rev.managerId].count++;
      });
    }

    // Manager Cards
    html += '<div class="section-title">매니저별 성과 요약</div>';
    mgrPerf.managers.filter(function(m) { return m.status === 'active'; }).forEach(function(m) {
      var rd = reviewData[m.managerId];
      html += '<div style="padding:0 32px 16px;">';
      html += '<div class="chart-card">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;">';
      html += '<div><h3 style="margin:0;">' + m.name + '</h3><span style="color:var(--text-secondary);font-size:12px;">' + (m.email || '') + '</span></div>';
      
      // Overall score badge
      var totalScore = m.qualityScore ? m.qualityScore.total : 0;
      var scoreClass = totalScore >= 65 ? 'score-high' : totalScore >= 50 ? 'score-mid' : 'score-low';
      html += '<div style="text-align:right;"><span class="score-badge ' + scoreClass + '" style="font-size:18px;padding:4px 12px;">' + totalScore + '/100 (' + (m.qualityScore ? m.qualityScore.grade : '-') + ')</span></div>';
      html += '</div>';

      // Stats row

      html += miniCard('담당 채팅', m.uniqueChats, 'purple', '🗂️ 해당 매니저가 참여한 고유 채팅 수입니다. 한 채팅에 여러 메시지를 보내도 1건으로 집계됩니다.');
      html += miniCard('평균 답변길이', m.avgReplyLength + '자', 'cyan', '📏 매니저 답변의 평균 글자 수입니다. 너무 짧으면 정보 부족, 너무 길면 가독성 저하. 50~200자가 적정 범위입니다.');

      // AI Quality Scores (if available)
      if (rd && rd.count > 0) {
        var avg = { resolution: 0, attitude: 0, accuracy: 0, responsiveness: 0, professionalism: 0, total: 0 };
        rd.scores.forEach(function(s) {
          avg.resolution += (s.resolution || 0);
          avg.attitude += (s.attitude || 0);
          avg.accuracy += (s.accuracy || 0);
          avg.responsiveness += (s.responsiveness || 0);
          avg.professionalism += (s.professionalism || 0);
          avg.total += (s.totalScore || 0);

        var aiTotal = (avg.total / n);
        var aiClass = aiTotal >= 20 ? 'score-high' : aiTotal >= 15 ? 'score-mid' : 'score-low';
        html += '<span class="score-badge ' + aiClass + '">' + aiTotal.toFixed(1) + '/25</span></div>';
        html += '<div class="radar-scores">';
        html += radarItem('문제해결 💡', (avg.resolution/n).toFixed(1));
        html += radarItem('응대태도 🤝', (avg.attitude/n).toFixed(1));
        html += radarItem('정보정확 ✅', (avg.accuracy/n).toFixed(1));
        html += radarItem('응답속도 ⏱️', (avg.responsiveness/n).toFixed(1));
        html += radarItem('전문성 🎓', (avg.professionalism/n).toFixed(1));
        html += '</div></div>';
      } else {
        html += '<div style="margin-top:12px;padding:12px;background:var(--bg-primary);border-radius:8px;color:var(--text-secondary);font-size:13px;text-align:center;">AI 품질 채점 데이터 수집 중...</div>';
      }

      html += '</div></div>';
    });

    // Inactive managers
    var inactive = mgrPerf.managers.filter(function(m) { return m.status === 'inactive'; });
    if (inactive.length > 0) {
      html += '<div class="section-title" style="color:var(--text-faint);">비활성 매니저</div>';
      html += '<div style="padding:0 32px 16px;"><div class="chart-card">';
      html += '<table><tr><th>매니저</th><th>이메일</th><th>상태</th></tr>';
      inactive.forEach(function(m) {
        html += '<tr><td style="color:var(--text-secondary);">' + m.name + '</td><td style="color:var(--text-secondary);">' + (m.email || '') + '</td><td><span class="pill" style="background:rgba(239,68,68,0.15);color:#ef4444;">비활성</span></td></tr>';
      });
      html += '</table></div></div>';
    }

    // Recent AI Reviews
    if (aiReviews && aiReviews.recent && aiReviews.recent.length > 0) {
      html += '<div class="section-title">최근 AI 품질 리뷰</div>';
      html += '<div style="padding:0 32px 16px;"><div class="chart-card">';
      html += '<div style="max-height:400px;overflow-y:auto;">';
      html += '<table><tr><th>시간</th><th>매니저</th><th>점수</th><th>평가 요약</th></tr>';
      aiReviews.recent.slice(0, 20).forEach(function(rev) {
        var time = rev.timestamp ? rev.timestamp.substring(5, 16).replace('T', ' ') : '-';
        var sc = rev.scores ? rev.scores.totalScore : 0;
        var scClass = sc >= 20 ? 'score-high' : sc >= 15 ? 'score-mid' : 'score-low';
        var mgr = mgrPerf.managers.find(function(m) { return m.managerId === rev.managerId; });
        var mgrName = mgr ? mgr.name : (rev.managerId || '').substring(0, 8);
        html += '<tr><td style="color:var(--text-secondary);white-space:nowrap;">' + time + '</td><td style="color:var(--text-primary);">' + mgrName + '</td><td><span class="score-badge ' + scClass + '">' + sc + '/25</span></td><td style="color:var(--text-secondary);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + (rev.scores ? rev.scores.summary || '' : '') + '</td></tr>';
      });
      html += '</table></div></div></div>';
    }

    document.getElementById('managersContent').innerHTML = html;
  });
}

        var msg = (c.userMessage || '').toLowerCase();
        if (msg.indexOf('合併') > -1 || msg.indexOf('一起寄') > -1) escReasons['합배송'] = (escReasons['합배송'] || 0) + 1;
        else if (msg.indexOf('取消') > -1) escReasons['취소관련'] = (escReasons['취소관련'] || 0) + 1;
        else if (msg.indexOf('客服') > -1 || msg.indexOf('人工') > -1 || msg.indexOf('轉') > -1) escReasons['직접요청'] = (escReasons['직접요청'] || 0) + 1;
        else if (msg.indexOf('沒收到') > -1 || msg.indexOf('還沒到') > -1 || msg.indexOf('出貨') > -1) escReasons['배송지연'] = (escReasons['배송지연'] || 0) + 1;
        else if (msg.indexOf('不滿') > -1 || msg.indexOf('太差') > -1 || msg.indexOf('投訴') > -1) escReasons['불만'] = (escReasons['불만'] || 0) + 1;
        else escReasons['기타'] = (escReasons['기타'] || 0) + 1;

        Object.values(escReasons).forEach(function(v) { if (v > escMax) escMax = v; });
        var escColors = { '합배송': '#3b82f6', '취소관련': '#ef4444', '직접요청': '#eab308', '배송지연': '#f97316', '불만': '#ef4444', '기타': '#64748b' };
        Object.keys(escReasons).sort(function(a, b) { return escReasons[b] - escReasons[a]; }).forEach(function(k) {
          var pct = Math.round((escReasons[k] / escMax) * 100);
          html += '<div class="bar-row"><div class="bar-label">' + k + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + (escColors[k] || '#64748b') + ';"></div><span class="bar-count">' + escReasons[k] + '</span></div></div>';
        });
        html += '</div></div>';

        // Language distribution from conversations
        var langs = {};
        (aiConv.conversations || []).forEach(function(c) { var l = c.lang || 'unknown'; langs[l] = (langs[l] || 0) + 1; });
        html += '<div class="chart-card"><h3>언어별 분포</h3><div class="bar-chart">';
        var langNames = { 'zh-TW': '繁體中文', 'ko': '한국어', 'en': 'English', 'ja': '日本語', 'unknown': '미감지' };
        var langMax = 1;
        Object.values(langs).forEach(function(v) { if (v > langMax) langMax = v; });
        Object.keys(langs).sort(function(a, b) { return langs[b] - langs[a]; }).forEach(function(k) {
          var pct = Math.round((langs[k] / langMax) * 100);
          html += '<div class="bar-row"><div class="bar-label">' + (langNames[k] || k) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:#3b82f6;"></div><span class="bar-count">' + langs[k] + '</span></div></div>';
        });
        html += '</div></div></div>';
      }

      // AI Conversation table
      html += '<div class="section-title">AI 대화 로그</div>';
      html += '<div style="padding:0 32px 16px;"><div class="chart-card">';
      // chatId별로 대화 그룹화
      var chatGroups = {};
      var chatOrder = [];
      (aiConv.conversations || []).forEach(function(c) {
        if (!chatGroups[c.chatId]) { chatGroups[c.chatId] = []; chatOrder.push(c.chatId); }
        chatGroups[c.chatId].push(c);
      });

      var typeColors = { ai_answer: '#22c55e', order_lookup: '#3b82f6', greeting: '#94a3b8', escalation: '#eab308', thank_you: '#a855f7', order_list: '#06b6d4', file_message: '#64748b', ces_response: '#8b5cf6' };
      var typeNames = { ai_answer: 'AI답변', order_lookup: '주문조회', greeting: '인사', escalation: '에스컬레이션', thank_you: '감사', order_list: '주문목록', file_message: '파일', ces_response: 'CES' };

      html += '<div style="max-height:700px;overflow-y:auto;">';
      chatOrder.forEach(function(chatId, gi) {
        var msgs = chatGroups[chatId];
        var firstTime = msgs[0].timestamp ? msgs[0].timestamp.substring(5, 16).replace('T', ' ') : '-';
        var lastMsg = msgs[msgs.length - 1];
        var hasEsc = msgs.some(function(m) { return m.escalated; });
        var userName = '';
        for (var ui = 0; ui < msgs.length; ui++) { if (msgs[ui].userName) { userName = msgs[ui].userName; break; } }
        var langBadge = msgs[0].lang || '?';
        var escBadge = hasEsc ? '<span class="pill" style="background:rgba(239,68,68,0.15);color:#ef4444;">에스컬</span>' : '<span class="pill" style="background:rgba(34,197,94,0.15);color:#22c55e;">완료</span>';

        html += '<div style="background:var(--bg-secondary);border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid var(--border-primary);cursor:pointer" onclick="this.querySelector(\'.conv-detail\').style.display=this.querySelector(\'.conv-detail\').style.display===\'none\'?\'block\':\'none\'">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center">';
        html += '<div><span style="color:var(--text-secondary);font-size:12px">' + firstTime + '</span> ';
        html += '<span style="color:var(--text-primary);font-weight:600;margin-left:8px">' + (userName || chatId.substring(0,8) + '...') + '</span> ';
        html += '<span class="pill" style="background:rgba(59,130,246,0.15);color:#3b82f6;margin-left:4px">' + langBadge + '</span> ';
        html += '<span style="color:var(--text-secondary);font-size:12px;margin-left:8px">' + msgs.length + '건 대화</span></div>';
        html += '<div>' + escBadge + ' <span style="color:var(--text-faint);font-size:10px;margin-left:4px">▼</span></div></div>';

        // 첫 번째 메시지 미리보기
        var previewMsg = '';
        for (var pi = 0; pi < msgs.length; pi++) {
          if (msgs[pi].type === 'ai_answer' || msgs[pi].type === 'escalation' || msgs[pi].type === 'order_lookup') {
            previewMsg = (msgs[pi].userMessage || '').substring(0, 80);
            break;
          }
        }
        if (previewMsg) html += '<div style="color:var(--text-secondary);font-size:12px;margin-top:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">💬 ' + previewMsg + '</div>';

        // 상세 대화 내용 (접었다 펼치기)
        html += '<div class="conv-detail" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border-primary)">';
        msgs.forEach(function(m) {
          var mTime = m.timestamp ? m.timestamp.substring(11, 16) : '';
          var tc = typeColors[m.type] || '#94a3b8';
          var tn = typeNames[m.type] || m.type;
          // 고객 메시지
          if (m.userMessage) {
            html += '<div style="margin-bottom:8px">';
            html += '<div style="display:flex;align-items:center;margin-bottom:4px"><span style="color:#3b82f6;font-size:11px;font-weight:600">👤 고객</span><span style="color:var(--text-faint);font-size:10px;margin-left:8px">' + mTime + '</span></div>';
            html += '<div style="background:var(--bg-primary);border-radius:8px;padding:10px;color:var(--text-secondary);font-size:13px;line-height:1.5;margin-left:20px;white-space:pre-wrap">' + m.userMessage + '</div>';
            html += '</div>';
          }
          // AI/봇 응답
          if (m.aiResponse) {
            html += '<div style="margin-bottom:8px">';
            html += '<div style="display:flex;align-items:center;margin-bottom:4px"><span style="color:' + tc + ';font-size:11px;font-weight:600">🤖 ' + tn + '</span><span style="color:var(--text-faint);font-size:10px;margin-left:8px">' + mTime + '</span>';
            if (m.escalated) html += '<span class="pill" style="background:rgba(239,68,68,0.15);color:#ef4444;margin-left:8px;font-size:10px">에스컬</span>';
            html += '</div>';
            html += '<div style="background:#1a2332;border-radius:8px;padding:10px;color:var(--text-secondary);font-size:13px;line-height:1.5;margin-left:20px;border-left:3px solid ' + tc + ';white-space:pre-wrap">' + m.aiResponse + '</div>';
            html += '</div>';
          }
        });

        // 평가 버튼 (마지막 AI답변에 대해)
        var lastAi = null;
        for (var li = msgs.length - 1; li >= 0; li--) { if (msgs[li].type === 'ai_answer') { lastAi = msgs[li]; break; } }
        if (lastAi) {
          html += '<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border-primary);text-align:right">';
          html += '<button style="padding:4px 12px;border-radius:6px;border:1px solid var(--border-primary);background:var(--bg-primary);color:var(--text-faint);cursor:pointer;font-size:11px;margin-left:4px" onclick="event.stopPropagation();showReview(\'' + encodeURIComponent(JSON.stringify(lastAi)) + '\')">📝 평가하기</button>';
          html += '</div>';
        }

        html += '</div></div>';
      });
      html += '</div></div></div>';
    }

    document.getElementById('aiContent').innerHTML = html;
  });
}

        // CSAT distribution
        html += '<div class="chart-card"><h3>CSAT 점수 분포</h3><div class="bar-chart">';
        var csatLabels = { 1: '1 - 매우만족 (Best)', 2: '2 - 만족', 3: '3 - 보통', 4: '4 - 불만족', 5: '5 - 매우불만족 (Worst)' };
        var csatColors = { 1: '#22c55e', 2: '#84cc16', 3: '#eab308', 4: '#f97316', 5: '#ef4444' };
        var csatMax = 1;
        for (var s = 1; s <= 5; s++) { if ((csat.distribution[s] || 0) > csatMax) csatMax = csat.distribution[s]; }
        for (var s = 1; s <= 5; s++) {
          var cnt = csat.distribution[s] || 0;
          var pct = Math.round((cnt / csatMax) * 100);
          html += '<div class="bar-row"><div class="bar-label" style="width:200px;">' + csatLabels[s] + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + csatColors[s] + ';"></div><span class="bar-count">' + cnt + '</span></div></div>';
        }
        html += '</div></div>';

        // Manager CSAT (if available)
        html += '<div class="chart-card"><h3>매니저별 CSAT (향후 데이터 수집)</h3>';
        html += '<div style="color:var(--text-secondary);font-size:13px;padding:20px;text-align:center;">CSAT 수집 시작 후 매니저별 만족도 데이터가 표시됩니다.</div>';
        html += '</div></div>';
      }
    } else {
      html += '<div style="padding:32px;text-align:center;">';
      html += '<div style="font-size:48px;margin-bottom:16px;">📊</div>';
      html += '<div style="color:var(--text-faint);font-size:16px;">CSAT 데이터가 아직 없습니다</div>';
      html += '<div style="color:var(--text-secondary);font-size:13px;margin-top:8px;">고객이 만족도 설문에 응답하면 여기에 표시됩니다</div>';
      html += '</div>';
    }

    document.getElementById('csatContent').innerHTML = html;
  });
}

// ===== HELPERS =====
function card(label, value, unit, color, sub, detail) {
    var colors = { green: '#10b981', blue: '#3b82f6', red: '#ef4444', yellow: '#f59e0b', purple: '#8b5cf6' };
    var detailHtml = detail ? '<div class="card-detail">' + detail + '</div>' : '';
    var arrowHtml = detail ? '<span class="card-arrow">▼</span>' : '';
    var clickAttr = detail ? ' onclick="toggleCardDetail(this)"' : '';
    return '<div class="card"' + clickAttr + '>' + arrowHtml + '<div class="label">' + label + '</div><div class="value" style="color:' + (colors[color] || colors.blue) + '">' + value + ' <small>' + unit + '</small></div><div class="sub">' + sub + '</div>' + detailHtml + '</div>';
  }
function miniCard(label, value, color, detail) {
    var colors = { green: '#10b981', blue: '#3b82f6', red: '#ef4444', yellow: '#f59e0b', purple: '#8b5cf6', cyan: '#22d3ee' };
    var detailHtml = detail ? '<div class="card-detail">' + detail + '</div>' : '';
    var arrowHtml = detail ? '<span class="card-arrow" style="top:6px;right:6px;font-size:8px">▼</span>' : '';
    var clickAttr = detail ? ' onclick="toggleCardDetail(this)"' : '';
    return '<div class="card" style="padding:12px"' + clickAttr + '>' + arrowHtml + '<div class="label" style="font-size:10px">' + label + '</div><div class="value" style="font-size:20px;color:' + (colors[color] || colors.blue) + '">' + value + '</div>' + detailHtml + '</div>';
  }
function radarItem(label, value) {
  var v = parseFloat(value);
  var color = v >= 4 ? '#22c55e' : v >= 3 ? '#eab308' : '#ef4444';
  return '<div class="radar-item"><div class="radar-val" style="color:' + color + ';">' + value + '</div><div class="radar-lbl">' + label + '</div></div>';
}
function categoryChart(cats) {
  var items = [];
  var catKeys = Object.keys(cats);
  for (var i = 0; i < catKeys.length; i++) {
    if (cats[catKeys[i]].count > 0) items.push({ key: catKeys[i], name: cats[catKeys[i]].nameKo || cats[catKeys[i]].name, count: cats[catKeys[i]].count });
  }
  items.sort(function(a, b) { return b.count - a.count; });
  var max = items.length > 0 ? items[0].count : 1;
  var colors = ['#3b82f6','#22c55e','#eab308','#ef4444','#a855f7','#06b6d4','#f97316','#ec4899','#84cc16','#6366f1'];
  var h = '<div class="chart-card"><h3>문의 카테고리 분포</h3><div class="bar-chart">';
  for (var j = 0; j < items.length; j++) {
    var pct = Math.round((items[j].count / max) * 100);
    h += '<div class="bar-row"><div class="bar-label">' + items[j].name + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + colors[j % colors.length] + ';"></div><span class="bar-count">' + items[j].count + '</span></div></div>';
  }
  h += '</div></div>';
  return h;
}
function keywordChart(keywords) {
  var h = '<div class="chart-card"><h3>자주 언급된 키워드 TOP 10</h3><ul class="keyword-list">';
  var kws = (keywords || []).slice(0, 10);
  for (var i = 0; i < kws.length; i++) {
    var word = kws[i].word.length > 20 ? kws[i].word.substring(0, 20) + '...' : kws[i].word;
    h += '<li><span class="kw">' + (i + 1) + '. ' + word + '</span><span class="kc">' + kws[i].count + '</span></li>';
  }
  h += '</ul></div>';
  return h;
}
function hourChart(dist) {
  var max = 1;
  for (var hh = 0; hh < 24; hh++) { if ((dist[hh] || 0) > max) max = dist[hh]; }
  var h = '<div class="chart-card"><h3>시간대별 문의 (대만 시간)</h3><div class="hour-chart">';
  for (var hh = 0; hh < 24; hh++) {
    var c = dist[hh] || 0;
    var w = Math.round((c / max) * 100);
    h += '<div class="hour-row"><div class="hour-label">' + (hh < 10 ? '0' : '') + hh + ':00</div><div class="hour-bar" style="width:' + w + '%;' + (c === max ? 'background:#ef4444;' : '') + '"></div><div class="hour-count">' + (c > 0 ? c : '') + '</div></div>';
  }
  h += '</div></div>';
  return h;
}
function messageBreakdown(r) {
  var total = r.botMessages + r.managerMessages;
  var botPct = total > 0 ? Math.round((r.botMessages / total) * 100) : 0;
  var mgrPct = 100 - botPct;
  var h = '<div class="chart-card"><h3>AI vs 매니저 응답 비율</h3>';
  h += '<div style="display:flex;height:24px;border-radius:12px;overflow:hidden;margin:20px 0;">';
  h += '<div style="width:' + botPct + '%;background:#22c55e;"></div>';
  h += '<div style="width:' + mgrPct + '%;background:#eab308;"></div>';
  h += '</div>';
  h += '<div style="display:flex;justify-content:space-between;font-size:14px;">';
  h += '<span style="color:#22c55e;">AI 봇 ' + botPct + '% (' + r.botMessages + '건)</span>';
  h += '<span style="color:#eab308;">매니저 ' + mgrPct + '% (' + r.managerMessages + '건)</span>';
  h += '</div>';
  h += '<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border-primary);font-size:13px;color:var(--text-faint);">목표: AI 응답률 70% 이상</div></div>';
  return h;
}
function insightsCard(r) {
  var insights = [];
  var catKeys = Object.keys(r.categories);
  var topCat = { key: '', count: 0 };
  for (var i = 0; i < catKeys.length; i++) {
    if (catKeys[i] !== 'other' && catKeys[i] !== 'agent_direct' && catKeys[i] !== 'agent_request' && r.categories[catKeys[i]].count > topCat.count) {
      topCat = { key: catKeys[i], count: r.categories[catKeys[i]].count, name: r.categories[catKeys[i]].nameKo };
    }
  }
  if (topCat.count > 0) insights.push('<span style="color:#3b82f6;">📊</span> 가장 많은 문의: <strong>' + topCat.name + '</strong> (' + topCat.count + '건) — FAQ 강화로 AI 해결률 향상 가능');
  if (r.unresolvedChats > 10) insights.push('<span style="color:#ef4444;">⚠️</span> 미해결 <strong>' + r.unresolvedChats + '건</strong> — 우선 처리 필요');
  var escCount = (r.categories.agent_direct ? r.categories.agent_direct.count : 0) + (r.categories.agent_request ? r.categories.agent_request.count : 0);
  var aiRate = Math.round((r.botMessages / (r.botMessages + r.managerMessages)) * 100);
  if (aiRate >= 70) insights.push('<span style="color:#22c55e;">✅</span> AI 응답률 <strong>' + aiRate + '%</strong> — 목표(70%) 달성');
  else insights.push('<span style="color:#eab308;">📈</span> AI 응답률 <strong>' + aiRate + '%</strong> — 목표 70%까지 ' + (70 - aiRate) + '%p 필요');

  var h = '<div class="insights-card"><h3>AI 인사이트</h3>';
  for (var j = 0; j < insights.length; j++) {
    h += '<div class="insight-item">' + insights[j] + '</div>';
  }
  h += '</div>';
  return h;
}

function closeReview() { document.getElementById('reviewModal').style.display = 'none'; }
function submitReview(encoded, rating) {
  var c = JSON.parse(decodeURIComponent(encoded));
  var comment = document.getElementById('reviewComment').value;
  fetch('/api/analytics/ai-review', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chatId: c.chatId, timestamp: c.timestamp, rating: rating, comment: comment, userMessage: c.userMessage, aiResponse: c.aiResponse })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.success) {
      var msgs = { good: '✅ 정확함으로 평가됨', bad: '❌ 부정확으로 평가됨', fix: '🔧 수정필요로 평가됨' };
      document.getElementById('reviewContent').innerHTML = '<div style="text-align:center;padding:40px;"><div style="font-size:48px;margin-bottom:16px;">' + (rating === 'good' ? '✅' : rating === 'bad' ? '❌' : '🔧') + '</div><div style="color:var(--text-primary);font-size:18px;">' + msgs[rating] + '</div></div>';
      setTimeout(closeReview, 1500);
    }
  }).catch(function(e) { alert('Error: ' + e.message); });
}

          var si = m.within30Rate >= 80 ? '&#128994;' : m.within30Rate >= 50 ? '&#128993;' : '&#128308;';
          html += '<tr style="color:var(--text-primary);border-bottom:1px solid var(--border-primary)"><td style="padding:8px">' + (mgrNameMap[m.managerId] || m.managerId) + '</td>';
          html += '<td style="text-align:center">' + m.avgMin + 'min</td>';
          html += '<td style="text-align:center">' + m.within30Rate + '%</td>';
          html += '<td style="text-align:center">' + m.samples + '</td>';
          html += '<td style="text-align:center">' + si + '</td></tr>';
        });
        html += '</table></div>';
      }

      // FCR Detail
      if (d.fcr) {
        html += '<div style="background:var(--bg-secondary);border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid var(--border-primary)">';
        html += '<div style="font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:12px">첫 접촉 해결률 (FCR)</div>';
        html += '<div style="display:flex;gap:20px">';
        html += '<div style="flex:1;text-align:center"><div style="font-size:36px;font-weight:700;color:' + (d.fcr.rate >= 70 ? '#10b981' : '#ef4444') + '">' + d.fcr.rate + '%</div><div style="font-size:11px;color:var(--text-secondary)">해결률</div></div>';
        html += '<div style="flex:1;text-align:center"><div style="font-size:36px;font-weight:700;color:#22d3ee">' + d.fcr.resolved + '</div><div style="font-size:11px;color:var(--text-secondary)">해결 건수</div></div>';
        html += '<div style="flex:1;text-align:center"><div style="font-size:36px;font-weight:700;color:#f59e0b">' + d.fcr.reopened + '</div><div style="font-size:11px;color:var(--text-secondary)">재문의 (72시간)</div></div>';
        html += '</div></div>';
      }

      // CES Detail
      html += '<div style="background:var(--bg-secondary);border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid var(--border-primary)">';
      html += '<div style="font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:12px">고객 노력 점수 (CES)</div>';
      if (d.ces && d.ces.totalResponses > 0) {
        var cesColor = d.ces.avgScore >= 3.5 ? '#10b981' : d.ces.avgScore >= 2.5 ? '#f59e0b' : '#ef4444';
        html += '<div style="display:flex;gap:20px">';
        html += '<div style="flex:1;text-align:center"><div style="font-size:36px;font-weight:700;color:' + cesColor + '">' + d.ces.avgScore.toFixed(1) + '</div><div style="font-size:11px;color:var(--text-secondary)">Average Score (1-5)</div></div>';
        html += '<div style="flex:1;text-align:center"><div style="font-size:36px;font-weight:700;color:#22d3ee">' + d.ces.totalResponses + '</div><div style="font-size:11px;color:var(--text-secondary)">Total Responses</div></div>';
        html += '</div>';
        html += '<div style="margin-top:12px;font-size:12px;color:var(--text-secondary)">1=매우 어려움 ~ 5=매우 쉬움 | 목표: 3.5 이상</div>';
      } else {
        html += '<div style="text-align:center;padding:20px;color:var(--text-secondary)">';
        html += '<div style="font-size:36px;margin-bottom:8px">&#128202;</div>';
        html += '<div style="font-size:14px">고객 노력 점수 수집이 시작되었습니다</div>';
        html += '<div style="font-size:12px;margin-top:4px">After CSAT survey, customers will be asked: "How easy was it to resolve your issue?"</div>';
        html += '<div style="font-size:11px;margin-top:8px;color:#f59e0b">응답이 들어오면 여기에 데이터가 표시됩니다</div>';
        html += '</div>';
      }
      html += '</div>';

      // Improvement Suggestions
      html += '<div style="background:var(--bg-secondary);border-radius:12px;padding:20px;border:1px solid var(--border-primary)">';
      html += '<div style="font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:12px">우선 개선 사항</div>';
      var suggestions = [];
      if (bd.noReply && bd.noReply.score < 3) suggestions.push({ p: 'HIGH', t: '미응답 종료율 ' + (d.noReplyClose ? d.noReplyClose.rate : '?') + '% (목표 10% 이하). 15분 자동 재배정 + 30분 대기 메시지 가동 중.' });
      if (bd.frt && bd.frt.score < 3) suggestions.push({ p: 'HIGH', t: '첫 응답 속도: ' + (d.responseTime ? d.responseTime.within30MinRate : '?') + '% 30분 내 응답 (목표 80% 이상). 매니저 근무시간 조정 필요.' });
      if (bd.fcr && bd.fcr.score < 3) suggestions.push({ p: 'MED', t: '첫 접촉 해결률: ' + (d.fcr ? d.fcr.rate : '?') + '% (목표 70% 이상). AI 직접 답변 범위 확대 필요.' });
      if (bd.csat && bd.csat.score < 3) suggestions.push({ p: 'MED', t: '고객 만족도 데이터 부족. 설문 수집 중, 응답 대기.' });
      if (bd.ces && bd.ces.score < 3) suggestions.push({ p: 'LOW', t: '고객 노력 점수 수집 시작됨. 약 2주 후 유의미한 데이터 확보 예상.' });
      if (suggestions.length === 0) suggestions.push({ p: 'OK', t: '모든 지표가 목표를 달성하고 있습니다!' });
      suggestions.forEach(function(s) {
        var pc = s.p === 'HIGH' ? '#ef4444' : s.p === 'MED' ? '#f59e0b' : '#10b981';
        html += '<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;padding:10px;background:var(--bg-primary);border-radius:8px;border-left:3px solid ' + pc + '">';
        html += '<span style="font-size:10px;font-weight:700;color:' + pc + ';white-space:nowrap">[' + s.p + ']</span>';
        html += '<span style="font-size:12px;color:var(--text-secondary)">' + s.t + '</span>';
        html += '</div>';
      });
      html += '</div>';

      container.innerHTML = html;
    })
    .catch(function(e) { console.log('CS Score load error:', e); });
}

</script>

<script>
// CS Score 트렌드 로딩
async function loadCSScoreTrend() {
  if (!document.getElementById('csScoreTrendPanel') && !document.getElementById('cs-score-trend')) { return; }
  try {
    const res = await fetch('/api/analytics/cs-score-trend?days=30');
    const data = await res.json();
    if (!data.success) return;
    
    // 트렌드 상태 표시
    const statusEl = document.getElementById('trend-status');
    const trendEmoji = data.trend === 'improving' ? '📈 개선 중' : data.trend === 'declining' ? '📉 하락 중' : '➡️ 유지';
    statusEl.innerHTML = `현재: <span style="color:#38bdf8;font-weight:bold;">${data.currentScore}/5.0</span> | 추세: ${trendEmoji} | 데이터: ${data.dataPoints}일치`;
    
    // 바 차트
    const barsEl = document.getElementById('trend-bars');
    if (data.history.length > 0) {
      barsEl.innerHTML = data.history.map(h => {
        const pct = (h.score / 5) * 100;
        const color = h.score >= 3.0 ? '#22c55e' : h.score >= 2.5 ? '#eab308' : '#ef4444';
        return `<div style="flex:1;min-width:12px;display:flex;flex-direction:column;align-items:center;">
          <span style="font-size:9px;color:var(--text-secondary);margin-bottom:4px;">${h.score}</span>
          <div style="width:100%;height:${pct}%;background:${color};border-radius:3px 3px 0 0;min-height:4px;" title="${h.date}: ${h.score}"></div>
          <span style="font-size:8px;color:var(--text-secondary);margin-top:2px;writing-mode:vertical-rl;">${h.date.slice(5)}</span>
        </div>`;
      }).join('');
    } else {
      barsEl.innerHTML = '<div style="color:var(--text-secondary);text-align:center;width:100%;padding:40px 0;">데이터 축적 중 (매일 23:55 자동 기록)</div>';
    }
    
    // 목표 도달 예측
    const predEl = document.getElementById('trend-prediction');
    if (data.estimatedDaysToTarget !== null && data.estimatedDaysToTarget > 0) {
      const targetDate = new Date();
      targetDate.setDate(targetDate.getDate() + data.estimatedDaysToTarget);
      predEl.innerHTML = `🎯 목표 3.0 도달 예측: <span style="color:#38bdf8;font-weight:bold;">약 ${data.estimatedDaysToTarget}일</span> (${targetDate.toISOString().split('T')[0]}) | 현재 추세 기준`;
    } else if (data.estimatedDaysToTarget === 0) {
      predEl.innerHTML = '🎉 목표 3.0 달성!';
    } else {
      predEl.innerHTML = '데이터가 2일 이상 축적되면 목표 도달 예측이 시작됩니다.';
    }
  } catch(e) {
    console.error('CS Score trend load error:', e);
  }
}

// FAQ 추천 로딩
async function loadFAQRecommendations() {
  if (!document.getElementById('faqRecPanel') && !document.getElementById('faq-recommendations')) { return; }
  try {
    const res = await fetch('/api/analytics/faq-recommendations?days=7');
    const data = await res.json();
    const el = document.getElementById('faq-rec-content');
    if (!data.success || !data.recommendations.length) {
      el.innerHTML = '에스컬레이션 데이터 축적 중... 7일간 데이터로 자동 분석합니다.';
      return;
    }
    
    el.innerHTML = `<div style="margin-bottom:10px;">최근 7일 에스컬레이션: <span style="color:#f59e0b;font-weight:bold;">${data.totalEscalations}건</span></div>` +
      data.recommendations.map((r, i) => `
        <div style="padding:10px;background:var(--bg-primary);border-radius:8px;margin-bottom:8px;border-left:3px solid ${i === 0 ? '#ef4444' : i === 1 ? '#f59e0b' : '#38bdf8'};">
          <div style="font-weight:bold;color:var(--border-primary);">#${i+1} ${r.category} (${r.escalationCount}건)</div>
          <div style="font-size:11px;margin-top:4px;">예시: ${r.sampleQuestions.slice(0,2).join(' / ')}</div>
          <div style="font-size:11px;color:var(--text-secondary);margin-top:4px;">${r.recommendation}</div>
        </div>
      `).join('');
  } catch(e) {
    console.error('FAQ recommendation load error:', e);
  }
}

// 사업 지표 로딩
async function loadBusinessMetrics() {
  if (!document.getElementById('bizMetricsPanel') && !document.getElementById('business-metrics')) { return; }
  try {
    const res = await fetch('/api/analytics/business-metrics?weeks=12');
    const data = await res.json();
    const el = document.getElementById('biz-metrics-content');
    if (!data.success || !data.metrics.length) {
      el.innerHTML = '주간 데이터 축적 중... 매주 월요일 10시 자동 기록됩니다.';
      return;
    }
    
    const latest = data.metrics[data.metrics.length - 1];
    el.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;">
        <div style="padding:12px;background:var(--bg-primary);border-radius:8px;text-align:center;">
          <div style="font-size:11px;color:var(--text-faint);">CS Score 추이</div>
          <div style="font-size:20px;color:#38bdf8;font-weight:bold;margin-top:4px;">${latest.csScore || '-'}</div>
        </div>
        <div style="padding:12px;background:var(--bg-primary);border-radius:8px;text-align:center;">
          <div style="font-size:11px;color:var(--text-faint);">주간 에스컬레이션</div>
          <div style="font-size:20px;color:#f59e0b;font-weight:bold;margin-top:4px;">${latest.totalEscalations || 0}건</div>
        </div>
        <div style="padding:12px;background:var(--bg-primary);border-radius:8px;text-align:center;">
          <div style="font-size:11px;color:var(--text-faint);">데이터 기간</div>
          <div style="font-size:20px;color:#22c55e;font-weight:bold;margin-top:4px;">${data.totalWeeks}주</div>
        </div>
      </div>
      <div style="margin-top:12px;font-size:11px;color:var(--text-faint);">
        ※ 재구매율/객단가/환불율은 Veasly 주문 DB 연동 후 자동 표시됩니다. 현재는 CS 지표만 수집합니다.
      </div>
    `;
  } catch(e) {
    console.error('Business metrics load error:', e);
  }
}

// CS Score 탭 활성화 시 모두 로딩
(function() {
  const origLoadCS = typeof loadCSScoreData === 'function' ? loadCSScoreData : null;
  if (origLoadCS) {
    window.loadCSScoreData = function() {
      origLoadCS();
      loadCSScoreTrend();
      loadFAQRecommendations();
      loadBusinessMetrics();
    };
  } else {
    // 탭 클릭 이벤트에 직접 연결
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(() => {
        loadCSScoreTrend();
        loadFAQRecommendations();
        loadBusinessMetrics();
      }, 2000);
    });
  }
})();
</script>


<script>
async function loadDataHealth() {
  if (!document.getElementById('health-content')) { return; }
  try {
    var res = await fetch('/api/analytics/data-health');
    var data = await res.json();
    var el = document.getElementById('health-content');
    if (!data.success) { el.innerHTML = '데이터 로딩 실패'; return; }
    
    var statusColors = { 'OK': '#22c55e', 'PARTIAL': '#eab308', 'INSUFFICIENT': '#ef4444', 'WAITING': '#64748b', 'COLLECTING': '#38bdf8' };
    var statusLabels = { 'OK': '충분', 'PARTIAL': '부분 수집', 'INSUFFICIENT': '부족', 'HEALTHY': '정상', 'NEEDS_DATA': '데이터 필요', 'WAITING': '대기중', 'COLLECTING': '수집중' };
    
    var overallColor = data.overallStatus === 'HEALTHY' ? '#22c55e' : data.overallStatus === 'PARTIAL' ? '#eab308' : '#ef4444';
    
    var html = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:15px;">';
    html += '<div style="width:12px;height:12px;border-radius:50%;background:' + overallColor + ';"></div>';
    html += '<span style="color:' + overallColor + ';font-weight:bold;">' + (statusLabels[data.overallStatus] || data.overallStatus) + '</span>';
    html += '</div>';
    
    var checks = data.checks;
    var items = [
      { name: 'CSAT (7일)', status: checks.csat.status, current: checks.csat.last7days, target: checks.csat.target },
      { name: 'CES (14일)', status: checks.ces.status, current: checks.ces.last14days, target: checks.ces.target },
      { name: 'FCR resolved', status: checks.fcr.status, current: checks.fcr.resolved, target: checks.fcr.target },
      { name: 'CS Score 이력', status: checks.scoreHistory.status, current: checks.scoreHistory.dataPoints, target: checks.scoreHistory.target }
    ];
    
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;">';
    items.forEach(function(item) {
      var color = statusColors[item.status] || '#64748b';
      var pct = Math.min(100, Math.round(item.current / item.target * 100));
      html += '<div style="padding:10px;background:var(--bg-primary);border-radius:8px;border-left:3px solid ' + color + ';">';
      html += '<div style="font-size:11px;color:var(--text-secondary);">' + item.name + '</div>';
      html += '<div style="font-size:16px;color:' + color + ';font-weight:bold;margin:4px 0;">' + item.current + '/' + item.target + '</div>';
      html += '<div style="width:100%;height:4px;background:var(--bg-primary);border-radius:2px;"><div style="width:' + pct + '%;height:100%;background:' + color + ';border-radius:2px;"></div></div>';
      html += '</div>';
    });
    html += '</div>';
    
    // 에스컬레이션율
    if (checks.aiConversations) {
      html += '<div style="margin-top:12px;padding:10px;background:var(--bg-primary);border-radius:8px;">';
      html += '<span style="font-size:11px;color:var(--text-faint);">AI 에스컬레이션율 (7일):</span> ';
      var escColor = checks.aiConversations.escalationRate > 40 ? '#ef4444' : checks.aiConversations.escalationRate > 25 ? '#eab308' : '#22c55e';
      html += '<span style="color:' + escColor + ';font-weight:bold;">' + checks.aiConversations.escalationRate + '%</span>';
      html += ' (' + checks.aiConversations.escalated7days + '/' + checks.aiConversations.last7days + '건)';
      html += '</div>';
    }
    
    // 추천 액션
    if (data.recommendations && data.recommendations.length > 0) {
      html += '<div style="margin-top:12px;padding:10px;background:var(--bg-primary);border-radius:8px;border-left:3px solid #f59e0b;">';
      html += '<div style="font-size:11px;color:#f59e0b;font-weight:bold;margin-bottom:6px;">📋 필요 조치</div>';
      data.recommendations.forEach(function(r) {
        html += '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px;">• ' + r + '</div>';
      });
      html += '</div>';
    }
    
    el.innerHTML = html;
  } catch(e) { console.error('Data health load error:', e); }
}

// 페이지 로드 시 실행
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(loadDataHealth, 1500);
});
</script>
